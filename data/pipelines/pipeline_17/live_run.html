<script type="application/json" id="pipelex-stuff-data-html">{"s_2467482915": "FLAGGED FOR REVIEW: Compliance Review Still Pending \u2013 Requesting Escalation - Urgent client escalation regarding a compliance review that has been pending for over three weeks despite multiple follow-ups. The delay is seriously impacting the ability to sell the product and disrupting business operations. Client has submitted CPC and Third-Party Test Report documents and is requesting escalation to the appropriate compliance team or manager for quicker resolution.", "s_4f58eddf27": "urgent client escalation compliance review", "s_833a75bb64": "<div><p>There are recent emails and discussions about an urgent client escalation related to a compliance review that has been pending for over three weeks despite multiple follow-ups. The delay is seriously impacting the ability to sell the product and disrupting business operations. The client has requested escalation to the appropriate compliance team or manager for quicker resolution. The case involves submission of CPC and Third-Party Test Report documents, with a request to update the CPSIA Warning Attribute on the product detail page[9].\n\nBest practices for handling such urgent client escalations include:\n- Acknowledge the issue clearly and take ownership.\n- Provide a summary of the issue history and explain the impact and urgency, such as missed deadlines, financial loss, or risk to client relationships[3][13].\n- Use a structured escalation email that sets realistic timelines and requests prompt action or review from higher management or specialized teams[2][4][5][6][13].\n- If the escalation involves compliance, ensure all required documentation is submitted and follow up persistently with the compliance team[9].\n- Hold cross-functional review meetings to analyze escalations and improve processes[1].\n- Escalate through proper channels, ensuring documentation of all efforts and communications[11].\n\nIn this specific compliance review case, the client has already submitted the necessary documents but is awaiting update on the status. They have requested escalation to management for faster resolution due to the business impact[9].</p><h4>Sources</h4><ul><li><a href=\"https://hiverhq.com/blog/escalation-management\" class=\"msg-document\">Escalation Management: Process, Types &amp; Tips for Support Teams</a><br/><small>Escalation management doesn\u2019t stop when the issue is fixed. A structured review process helps you learn from each case and strengthen your support operations. Here\u2019s how to make it actionable: Hold weekly or monthly cross-functional meetings with support, product, and operations teams to analyze recent escalations.\nOnce you\u2019ve decided an issue needs to be escalated, the next step is figuring out where it sits on your priority list. Treating every escalation as urgent wastes resources\u2014your team could be fixing a minor bug while a major outage waits.\nIt\u2019s important to note that not all escalations are equal in terms of priority or urgency. You need to develop a system that prioritizes your incoming customer escalations. This could be based on how severe the situation is, how urgent it is for you to respond, and how much time you have before the situation turns dire.\nEscalation management doesn\u2019t stop when the issue is fixed. A structured review process helps you learn from each case and strengthen your support operations. Here\u2019s how to make it actionable: Hold weekly or monthly cross-functional meetings with support, product, and operations teams to analyze recent escalations.\nOne of the biggest challenges with managing escalations is keeping track of them, and it\u2019s hard to do manually. That\u2019s where tools like Hiver can help. Hiver is an AI-powered customer service platform that helps you manage customer queries across email, chat, phone, WhatsApp, and social media (Instagram and Facebook) from a single interface.</small></li><li><a href=\"https://www.quora.com/I-recently-got-few-escalations-from-client-How-do-I-reply-for-escalation-emails\" class=\"msg-document\">I recently got few escalations from client. How do I reply for escalation emails? - Quora</a><br/><small>Now, if the escalation leads to a loss of business/legal, seek help and promise a deadline. Assure that you&amp;#x27;re working with a team to fix and you take complete responsibility. Email handling is one, but once you\u2019ve dropped, give a call and explain what went wrong from a different perspective that could convince the user.\nNow, if the escalation leads to a loss of business/legal, seek help and promise a deadline. Assure that you&#39;re working with a team to fix and you take complete responsibility. Email handling is one, but once you\u2019ve dropped, give a call and explain what went wrong from a different perspective that could convince the user.\nAn email usually does not convey your concern for the client\u2019s issues as much as a 20 minute talk does. Also many more data points emerge when the client is talking and sharing data straight off a whiteboard or her desktop. But go prepared. Reinforce the greater goal. \u201cWe are all working towards a better qualit ... Amit Choudhary&#39;s answer to I recently got few escalations from client.\nRephrase the issue to what it actually is. Appraise management on what happened and what you are doing about it. Caution: If the escalation is genuine and the client a responsible professional, this could backfire. So think twice before adding higher management on the escalation email chain.\nResponding to escalation emails requires clarity, ownership, and a plan that restores confidence. Use a structured message that acknowledges the issue, explains what you\u2019ve done and will do, and sets realistic timelines.</small></li><li><a href=\"https://www.maestrolabs.com/how-to/write-an-escalation-email-with-examples-and-samples\" class=\"msg-document\">How to Write an Escalation Email (with Examples and Samples)</a><br/><small>By summarizing the history of the issue you\u2019re giving the recipient a clear understanding of what\u2019s happened and why escalation is required. Next explain why this is important and what\u2019s the impact on the project, team or business. This is your chance to stress the urgency of the situation. Be specific about the consequences such as missed deadlines, financial loss or risk to client relationships so the recipient understands the severity of the issue.\nDespite multiple follow ups there\u2019s been no response from the key decision maker. Escalating to their manager may be necessary to keep the project on track. Sometimes an issue is so urgent it can\u2019t wait for normal process to resolve. For example business operations are at risk or a major client is on the line.\nEscalation emails are used in customer service, project management and internal business communications but can be used in almost any professional situation where time sensitive or critical matters need urgent attention.\nExample: A major client is threatening to cancel their contract due to service issues. This is a high priority escalation to management to prevent further damage to the business relationship. Escalation should not be the first step in resolving a conflict or issue.\nBy summarizing the history of the issue you\u2019re giving the recipient a clear understanding of what\u2019s happened and why escalation is required. Next explain why this is important and what\u2019s the impact on the project, team or business. This is your chance to stress the urgency of the situation. Be specific about the consequences such as missed deadlines, financial loss or risk to client relationships so the recipient understands the severity of the issue.</small></li><li><a href=\"https://hiverhq.com/blog/escalation-email-templates-and-best-practices\" class=\"msg-document\">15 Effective Escalation Email Templates to Use in 2025.</a><br/><small>Subject: Requesting urgent update on pending issue Hi [Vendor Name], I hope you\u2019re doing well. I wanted to check in on the [briefly state issue] we reached out about on [date]. We haven\u2019t received a response yet, and this delay is beginning to impact our timelines. Could you please let us know the current status or escalate this internally for quicker resolution?\nSubject: Urgent: Issue with [Product/Service] Dear [Vendor\u2019s Name], I am writing to escalate an issue with [query ticket number]. Despite previous communications and attempts to resolve the matter, the issue persists, significantly impacting our operations.\nWhen to use: When a vendor has not replied to a previous query or issue, and the delay is beginning to affect project timelines or service delivery. Why it\u2019s effective: It strikes a polite but urgent tone, highlights the potential business impact of their silence, and sets a clear expectation for a response, prompting quicker follow-up or internal escalation on their end.\nSubject: Requesting urgent update on pending issue Hi [Vendor Name], I hope you\u2019re doing well. I wanted to check in on the [briefly state issue] we reached out about on [date]. We haven\u2019t received a response yet, and this delay is beginning to impact our timelines. Could you please let us know the current status or escalate this internally for quicker resolution?\nWe understand things can fall through the cracks, but this delay is starting to impact [consequence]. Could you help us escalate this internally so we can resolve it quickly? Appreciate your support, [Your Name] When to use: When you want to inform an executive about a developing issue that isn\u2019t urgent yet, but may require their awareness or involvement soon.</small></li><li><a href=\"https://hrc.edu.pl/escalation-email-samples/\" class=\"msg-document\">20 Effective Escalation Email Samples To Resolve Issues Quickly</a><br/><small>I am writing to escalate the urgency ... Your prompt feedback would be greatly appreciated! ... I am writing to escalate an important health and safety compliance issue that has been identified during a recent review....\nA thorough review of this situation is warranted. I appreciate your immediate attention. ... I hope you\u2019re well! I am writing to escalate the urgency surrounding the budget approval for [specific project or department]. It is pivotal for our next steps. Your prompt feedback would be greatly appreciated! ... I am writing to escalate an important health and safety compliance issue that has been identified during a recent review.\nEffective communication is crucial in the workplace, and escalation emails play a vital role in addressing urgent issues. Professionals often rely on escalation email samples to convey problems clearly to stakeholders. These samples typically include essential elements such as a clear subject line, detailed issue description, and action item requests. Timely responses are critical in ensuring swift resolutions, making the structure of these emails particularly important. Senior management frequently reviews escalation emails to understand challenges and facilitate prompt action.\nYour urgent intervention in this matter would be appreciated. ... I hope you\u2019re having a great day! I would like to escalate the feedback provided on [specific issue or project]. It seems that we have not yet addressed the concerns raised, which could affect morale and productivity. Looking forward to your guidance on this. ... I hope you\u2019re doing well! I am reaching out to escalate the need for feedback on the recent proposal submitted for [specific project]. Quick input is necessary for proceeding further.\nI am writing to escalate an ongoing scheduling conflict for [specific event or meeting]. Multiple participants have expressed their concerns regarding unavailability, which necessitates urgent resolution.</small></li><li><a href=\"https://flodesk.com/tips/escalation-email-templates\" class=\"msg-document\">5 great escalation email templates to copy &amp; paste | Flodesk Tips</a><br/><small>Please let me know your availability to discuss this further. ... I am writing to escalate the payment for invoice [Invoice Number], which was due on [Due Date]. The outstanding amount is [Amount Due].\nThis delay directly impacts [explain the consequences, e.g., the launch of our marketing campaign, our ability to meet client commitments]. To mitigate this and get the project back on track, we require [state the specific action needed, e.g., your approval on the revised budget, additional resources, a decision on X]. I have attached the revised project plan for your review. Please let me know your availability to discuss this further. ... I am writing to escalate the payment for invoice [Invoice Number], which was due on [Due Date]. The outstanding amount is [Amount Due].\nInclude a clear timeline. Show that you&#39;ve already tried to solve the problem. List the dates you reached out, who you talked to, and any ticket numbers you have. This context is key to justifying the escalation.\nI am writing to escalate a complaint regarding [briefly describe the issue]. My account or order number is [Account/Order Number]. I have already attempted to resolve this through your standard support channels without success.\nI am writing to escalate a persistent technical issue regarding [Feature/Product Name]. My original ticket number is [Ticket Number]. Despite previous attempts to resolve this, the problem remains and is impacting our workflow.</small></li><li><a href=\"https://myemailsamples.com/escalation-email-samples/\" class=\"msg-document\">20 Escalation Email Samples - My Email Samples</a><br/><small>Multiple calls to your support line have resulted only in promises to escalate, with no actual resolution. This extended access denial has severely impacted our business operations. Please review the attached verification documents and restore our account access immediately. This situation ...\nMultiple calls to your support line have resulted only in promises to escalate, with no actual resolution. This extended access denial has severely impacted our business operations. Please review the attached verification documents and restore our account access immediately. This situation requires urgent senior-level attention.\nThis situation affects our ability to serve over 1,000 clients. Your technical support keeps marking tickets as \u201cresolved\u201d without actually fixing the underlying access issues. This approach has wasted valuable time and resources. Please review the attached access logs and error reports. This ongoing situation requires immediate senior technical intervention. Best regards, Michael Foster Customer Relations Director \u00b7 Each escalation email helps you get results after standard channels fail.\nA well-crafted escalation email becomes your next step. Strong email writing skills make the difference between ongoing frustration and quick results. These 20 proven examples will show you how to get attention and action from higher-ups. These emails will help you share your concerns effectively while staying professional throughout each step. Subject: Urgent Follow-up Required \u2013 Order #12345 Delayed 3 Weeks\nThese failures have cost our business approximately $15,000 in lost sales. Your standard support cannot provide adequate answers or escalation paths. Please find attached transaction logs showing the failures. This requires urgent senior-level intervention.</small></li><li><a href=\"https://simplestic.com/escalation-customer-service-example-emails/\" class=\"msg-document\">15 Escalation Customer Service Example Emails | Simplestic</a><br/><small>This escalation involves a billing issue that is outside my approval authority. The customer has been charged incorrectly and is requesting a refund beyond the threshold I can authorize.\nIt is imperative that we address this matter urgently to avoid further dissatisfaction. I appreciate your immediate attention to this situation. Best, [Your Name] Next, we provide examples of emails from an employee to their manager, asking for help in resolving a customer issue, and escalating it further. I\u2019m escalating a customer concern that has not been resolved after several attempts. The client has followed up multiple times, and they are growing increasingly frustrated.\nThis escalation involves a billing issue that is outside my approval authority. The customer has been charged incorrectly and is requesting a refund beyond the threshold I can authorize. They\u2019ve expressed urgency and are threatening to cancel service. Requesting your review and next action. The client has contacted us repeatedly about a delayed delivery that now exceeds our SLA.\nEscalating for your review and response. The client has received mixed messages from different agents, which has created confusion and dissatisfaction. I\u2019ve apologized and provided a consistent summary, but they\u2019ve asked for a final decision from someone in management.\nHi [Manager\u2019s Name], I am escalating a request from [Customer Name] for special consideration regarding [specific request]. Given the circumstances, I believe it warrants urgent attention and a tailored approach. Please let me know how we can proceed.</small></li><li><a href=\"https://sellercentral.amazon.com/seller-forums/discussions/t/fed06d05-47a2-4c75-ad49-bc5088ecff00\" class=\"msg-document\">Compliance Review Still Pending \u2013 Requesting Escalation</a><br/><small>I&amp;#x27;m sorry you have had a delay with your compliance review. I&amp;#x27;ve reviewed your Case as well as your Compliance Review. At this time the team has requested you update the CPSIA Warning Attribute on your detail page. You can learn more in the original Case 17565697911.\nDear Amazon Team and Forum Managers,I\u2019m seeking urgent help regarding a compliance document review that has been pending for over three weeks des eople in your department can&#39;t go on until the helpdesk does the thing, that makes it a lot more urgent. Start by sending an email with all the information they&#39;ll need. Then after a reasonable amount of time (a few minutes for anything that&#39;s really on fire, otherwise about 30 minutes) call them to politely inquire. EDIT: as Peter mentioned, I didn&#39;t explain why it&#39;s escalation.\nThen I received a call from one of them telling me this is inappropriate escalation. Given that it&#39;s from a team member, not a manager, disregard it. He/she should have complained by replying to the email. Urgent issues often mean more extreme remedies.\nIf the company is losing 6 figures a minute and you only call once, don&#39;t get through, wait half an hour and then send an email, you&#39;re probably doing something very wrong. I can&#39;t really think of a scenario where that would be an appropriate escalation. ... @Dukeling If it\u2019s costing your company six figures a minute, they\u2019re probably making 8-9 figures per day, depending on how much of their revenue stream is being affected: if six figures of losses is 1% of your businesses\u2019 income... ... @Dukeling If a client is losing 6 figures a minute because of something I did, after 5 minutes both my and my boss&#39; phones would be on fire...</small></li><li><a href=\"https://www.theknowledgeacademy.com/blog/escalation-matrix/\" class=\"msg-document\">Escalation Matrix: A Guide to Effective Issue Resolution</a><br/><small>Ensure there are efficient methods for submitting Escalation issues, whether through dedicated email addresses, software systems, or escalation request forms. 4) Educate Your Team: Educate your team about the Matrix through training sessions and effective communication. This ensures everyone understands its significance and how to follow it properly. 5) Monitor and Update Regularly: Regular monitoring and updates are essential to keep the Matrix relevant and effective. Review the Matrix regularly to track issue resolutions and identify any bottlenecks or areas for improvement.\nEnsure there are efficient methods for submitting Escalation issues, whether through dedicated email addresses, software systems, or escalation request forms. 4) Educate Your Team: Educate your team about the Matrix through training sessions and effective communication. This ensures everyone understands its significance and how to follow it properly. 5) Monitor and Update Regularly: Regular monitoring and updates are essential to keep the Matrix relevant and effective. Review the Matrix regularly to track issue resolutions and identify any bottlenecks or areas for improvement.\nIf the problem persists or is too complex for the frontline team, it is escalated to a higher authority or team with the expertise or power to resolve it. They are more formal and urgent processes, often involving managers or senior staff who can address critical issues promptly.\nWhen an employee or manager has attempted multiple times to de-escalate a problem independently but cannot achieve a resolution on the initial contact, it becomes necessary to commence the process of Escalating the issue. Ensure that comprehensive documentation of the problem exists, along with records of the efforts made to resolve it. This documentation should encompass pertinent emails, precise timestamps for phone calls, instances of missed deadlines, Human Resources reports, and any customer complaints received.\nJohn Davies is a cybersecurity expert specialising in governance, risk management, and compliance. With over 15 years in the field, he has led enterprise-wide security programmes across finance, healthcare and public sector organisations.</small></li><li><a href=\"https://flodesk.com/tips/user-access-review-email-templates\" class=\"msg-document\">5 great user access review email templates to copy &amp; paste | Flodesk Tips</a><br/><small>Subject: URGENT: Overdue Access Review for [*User Name*] Requires Immediate Action \u00b7 Hi [*Escalation Contact Name*], I\u2019m writing to you because the access review for [*User Name*] is now past its deadline and requires your immediate attention.\nSubject: URGENT: Overdue Access Review for [*User Name*] Requires Immediate Action \u00b7 Hi [*Escalation Contact Name*], I\u2019m writing to you because the access review for [*User Name*] is now past its deadline and requires your immediate attention. The original request sent to [*Manager Name*] has not been completed.\nThis is a quick note to let you know that the recent access review for [*Application/System Name*] is complete.</small></li><li><a href=\"https://simplestic.com/escalation-emails/\" class=\"msg-document\">How to Write Escalation Emails: Tips, Snippets, and Best Practices | Simplestic</a><br/><small>I\u2019d appreciate your support in reviewing the situation and helping us identify a path forward. Our team is committed to collaborating, but we\u2019re at a point where escalation is necessary. Thank you for your time and guidance. ... I am escalating the status of support ticket #[ticket number] concerning [client name]\u2019s request.\nI\u2019m writing to escalate an ongoing issue related to [project/task] that remains unresolved despite previous follow-ups.\u201d \u00b7 \u201cThis delay has impacted our ability to proceed with [specific phase or milestone], and may affect downstream timelines, including client delivery and compliance deadlines.\u201d\nThis is a formal escalation regarding ongoing delays in documentation required for [compliance review/project milestone].\nI\u2019d appreciate your support in reviewing the situation and helping us identify a path forward. Our team is committed to collaborating, but we\u2019re at a point where escalation is necessary. Thank you for your time and guidance. ... I am escalating the status of support ticket #[ticket number] concerning [client name]\u2019s request.\nAn escalation email is a formal communication used when a task, project, or issue requires urgent attention or has not been addressed within an expected timeframe. These emails are typically directed to a higher authority or additional stakeholder to ensure timely resolution.</small></li><li><a href=\"https://www.linkedin.com/pulse/how-handle-client-escalation-jai-ganesh-vaidyanathan\" class=\"msg-document\">How to handle a client escalation?</a><br/><small>The PM should discuss any team member resourcing needs, to address the escalation, clearly with the DH. The PM, with the DH\u2019s help, should ensure that the required team members are available to make the agreed changes within the set time. Once the issue categorization list and RCA data is available, an email needs to be sent out to the client informing that the issues have been understood and may be discussed.\nThe PM should discuss any team member resourcing needs, to address the escalation, clearly with the DH. The PM, with the DH\u2019s help, should ensure that the required team members are available to make the agreed changes within the set time. Once the issue categorization list and RCA data is available, an email needs to be sent out to the client informing that the issues have been understood and may be discussed.\nMost often, clients tend to bypass escalation hierarchy and escalate an issue to a top management person within the organization. They may either escalate verbally over phone or through an email.\nIf the fixes will take more time, then the PM may also plan a staggered delivery of the files, if technically possible, so that the client will keep receiving files every day or every alternative day that they can begin to review, while the team worked on the other files over a more relaxed timeline. Ideally, even before the project development is commenced, a call between the client and the project team should be set up by the PM to discuss project scope and expectations. The escalation hierarchy should also be communicated clearly to the client.\nRemember, the client only remembers a bad delivery, never a delayed one. So as a PM, never let anyone, not even the DH, push you for a quicker delivery just to earn a brownie point. And how you handle the escalation sets your relation with the client and the project team.</small></li><li><a href=\"https://www.givainc.com/blog/incident-escalation/\" class=\"msg-document\">What Is Incident Escalation? How to Plan Triggers &amp; Policies | Giva</a><br/><small>Important: Make sure agents also know how that handoff happens; whether it&amp;#x27;s by phone, email, Slack, in-app alerts, etc. Set clear parameters around how long to wait before escalating. If a customer is angry or the issue is urgent, agents can use judgment.\nImportant: Make sure agents also know how that handoff happens; whether it&#39;s by phone, email, Slack, in-app alerts, etc. Set clear parameters around how long to wait before escalating. If a customer is angry or the issue is urgent, agents can use judgment.\nIssue detection \u2192 triage (first agent) \u2192 escalation (if needed) \u2192 resolution \u2192 review\nIncident escalation is moving a problem up a pre-defined chain of help when the situation requires more support than the current level can provide. In a solid incident management process, escalations are usually triggered based on certain rules, like how long the issue&#39;s been open, what kind it is and its severity level.\nAs mentioned off the top, escalation isn&#39;t a reactive move, it&#39;s a core part of the overall incident management process. It comes right after the first point of contact and attempted resolution. That&#39;s when progress stalls or specific thresholds are met.</small></li><li><a href=\"https://textexpander.com/templates/escalation-email\" class=\"msg-document\">How to Write an Escalation Email (with 12 Templates)</a><br/><small>I am writing to escalate an issue regarding the timeline for the Johnson project. Despite my discussions with the team, we have encountered significant delays due to unforeseen technical challenges.\nI am writing to escalate an issue regarding the timeline for the Johnson project. Despite my discussions with the team, we have encountered significant delays due to unforeseen technical challenges. The project is now at risk of missing the delivery deadline of March 15, which could impact our client relationship. I would appreciate your guidance on how to address this matter effectively. Thank you for your attention to this urgent issue.\nWorkplace issues can quickly spiral beyond control, making it essential to escalate matters efficiently. An escalation email is a powerful way to alert decision-makers to urgent problems, ensuring issues receive the attention needed for resolution. Let\u2019s discuss when to write an escalation email, how to structure it for maximum impact, and best practices to ensure issues are resolved quickly and appropriately.\nIncreasing Severity: When a problem escalates and requires immediate action from higher management or stakeholders.\nWriting an effective escalation email involves a structured approach.</small></li><li><a href=\"https://www.freshworks.com/explore-cx/escalation-management/\" class=\"msg-document\">The Guide to Escalation Management in Customer Service - Freshdesk</a><br/><small>As discussed above, ticket prioritization is very important when it comes to creating escalation rules. With Freshdesk, you can prioritize tickets automatically by using specific conditions. For example, all emails with \u201cnot working\u201d in the subject line can be prioritized as urgent.\nAs discussed above, ticket prioritization is very important when it comes to creating escalation rules. With Freshdesk, you can prioritize tickets automatically by using specific conditions. For example, all emails with \u201cnot working\u201d in the subject line can be prioritized as urgent.\nWhile creating escalations for SLA violations, it\u2019s also important to look at the priorities of the issues. Urgent/high priority escalations such as billing issues or grievances raised on social media should be immediately assigned to the senior-most managers, while the lower priority tickets can be assigned to team leads, or other senior support agents.\nTo help you understand these nuances better, here\u2019s a look at how we, at Freshworks, manage priority-based escalations: At Freshdesk, we have different SLA policies set up for different products and different ticket priorities. For instance, if it is a finance-related requirement such as a payment failure, or a downgrade request, the ticket is prioritized as \u2018urgent\u2019 and follows very tight response and resolution deadlines.\nFor example, here\u2019s how we establish the escalation matrix at Freshworks. If an escalation occurs, the escalation email is sent to the ticket assignee, then to his/her reporting manager and finally to all the other regional leads to ensure quick action.</small></li><li><a href=\"https://callminer.com/faq/what-is-an-escalation-process\" class=\"msg-document\">What is the escalation process in a contact center and how can it be improved? | CallMiner</a><br/><small>Escalations typically occur in contact centers when an agent lacks the authority, technical knowledge, or access to resources needed to resolve a customer\u2019s request. They can also happen when the customer specifically requests a higher-level authority, when policies require elevated review, or when compliance concerns arise.\nEscalations typically occur in contact centers when an agent lacks the authority, technical knowledge, or access to resources needed to resolve a customer\u2019s request. They can also happen when the customer specifically requests a higher-level authority, when policies require elevated review, or when compliance concerns arise.\nFrontline Agent Experience Quality Management Contact Center Efficiency Risk &amp; Compliance Fraud Detection Sales Effectiveness \u00b7 Customer Experience ws.\nLimited resources to handle escalations mean delayed response times for urgent issues, which causes customer frustration.\npriority escalation ensures your team can respond quickly and consistently when the stakes are high. Example: A major client\u2019s integration is down, triggering a high-priority escalation path.\nknowledge base and other self-service content up-to-date to avoid confusion and potential escalations. Swifteq\u2019s \u00b7 Help Center Manager reduces the manual work required to update your help docs. Review escalated tickets weekly or monthly to identify systemic problems and opportunities for improvement.</small></li><li><a href=\"https://www.apizee.com/escalation-management.php\" class=\"msg-document\">Escalation Management: Strategies, Tools, and Best Practices for Success</a><br/><small>Customers interact with businesses across multiple platforms, including phone, email, social media, live chat, and remote video support. A unified omnichannel support system ensures a consistent escalation process regardless of the channel. ... Establish well-defined SLAs (Service Level Agreements) that outline response and resolution timeframes for different escalation levels. This ensures accountability and helps teams prioritize urgent cases efficiently.\nCustomers interact with businesses across multiple platforms, including phone, email, social media, live chat, and remote video support. A unified omnichannel support system ensures a consistent escalation process regardless of the channel. ... Establish well-defined SLAs (Service Level Agreements) that outline response and resolution timeframes for different escalation levels. This ensures accountability and helps teams prioritize urgent cases efficiently.\nSince empathy is a key driver of customer loyalty, agents should be trained in active listening, de-escalation techniques, and problem-solving skills to resolve issues at the lowest level possible before further escalation. ... Leverage AI-driven automation tools to prioritize urgent cases, trigger escalations automatically, and route them to the right teams based on predefined rules.\nFinancial Services: The 8-15% escalation rate highlights the highly regulated nature of this industry, where strict compliance and handling of sensitive financial data make escalations more frequent.\nHow to Master Escalation Management and Improve Customer ... ... Customers expect the freedom to choose how they engage with your business\u2014whether through social media, chat, email, phone, or video calls\u2014while still receiving fast and efficient service. According to HubSpot Research, 90% of customers consider an &#39;immediate&#39; response essential or very important when they have a customer service question.</small></li></ul></div>", "s_85db15f777": "<table><tr><th>subject</th><td>Compliance Review Still Pending \u2013 Requesting Escalation</td></tr><tr><th>priority</th><td>needs_review</td></tr><tr><th>summary</th><td>Urgent client escalation regarding a compliance review that has been pending for over three weeks despite multiple follow-ups. The delay is seriously impacting the ability to sell the product and disrupting business operations. Client has submitted CPC and Third-Party Test Report documents and is requesting escalation to the appropriate compliance team or manager for quicker resolution.</td></tr></table>"}</script>
    <script nonce="PIPELEX_CSP_NONCE">
const themes = ['dark', 'light', 'system'];
const initialTheme = "dark";
let currentThemeIndex = themes.indexOf(localStorage.getItem('pipelex-theme') || initialTheme);
if (currentThemeIndex === -1) currentThemeIndex = 0;

// Layout direction toggle
const initialDirection = "LR";
let currentDirection = initialDirection;

const palette = "dracula";

function applyPalette(palette) {
    document.documentElement.setAttribute('data-palette', palette);
}

function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('pipelex-theme', theme);
    // Update button icons
    document.querySelectorAll('.theme-icon').forEach(icon => icon.classList.remove('active'));
    const activeIcon = document.querySelector(`.${theme}-icon`);
    if (activeIcon) activeIcon.classList.add('active');
}

// Set up theme toggle button
document.getElementById('theme-toggle').addEventListener('click', () => {
    currentThemeIndex = (currentThemeIndex + 1) % themes.length;
    applyTheme(themes[currentThemeIndex]);
});

// Apply initial theme and palette immediately
applyTheme(themes[currentThemeIndex]);
applyPalette(palette);

// Apply direction icon: show the direction we will switch TO (opposite of current)
function applyDirectionIcon(direction) {
    document.querySelectorAll('.direction-icon').forEach(icon => icon.classList.remove('active'));
    const targetIcon = document.querySelector(direction === 'LR' ? '.tb-icon' : '.lr-icon');
    if (targetIcon) targetIcon.classList.add('active');
}
applyDirectionIcon(currentDirection);

// Set up direction toggle button
document.getElementById('direction-toggle').addEventListener('click', () => {
    currentDirection = currentDirection === 'LR' ? 'TB' : 'LR';
    applyDirectionIcon(currentDirection);
    if (window.setLayoutDirection) window.setLayoutDirection(currentDirection);

function buildDataflowAnalysis(graphspec) {
    if (!graphspec) return null;

    const stuffRegistry = {};      // digest -> { name, concept, data, dataText, dataHtml }
    const stuffProducers = {};     // digest -> producer_node_id
    const stuffConsumers = {};     // digest -> [consumer_node_ids]
    const containmentTree = {};    // parent_id -> [child_ids]

        if (edge.kind === 'contains') {
            if (!containmentTree[edge.source]) containmentTree[edge.source] = [];
            containmentTree[edge.source].push(edge.target);
            childNodeIds.add(edge.target);
        }
    }

    // Controller IDs are nodes that have children
    const controllerNodeIds = new Set(Object.keys(containmentTree));

    // Process all nodes to register stuffs
    // Two passes: first register all stuffs, then build producer/consumer maps for operators only
    for (const node of graphspec.nodes) {
        const nodeIo = node.node_io || {};
        const isController = controllerNodeIds.has(node.node_id);

        // Register outputs to stuffRegistry from ALL nodes (including controllers for batch aggregates)
        for (const output of (nodeIo.outputs || [])) {
            if (output.digest && !stuffRegistry[output.digest]) {
                stuffRegistry[output.digest] = {
                    name: output.name,
                    concept: output.concept,
                    contentType: output.content_type,
                    data: output.data,
                    dataText: output.data_text,
                    dataHtml: output.data_html,
                };
            }
            // Only track operators as producers for data flow edges (not controllers)
            if (output.digest && !isController) {
                stuffProducers[output.digest] = node.node_id;
            }
        }

        // Register inputs to stuffRegistry (pipeline inputs may not have producers)
        for (const input of (nodeIo.inputs || [])) {
            if (input.digest && !stuffRegistry[input.digest]) {
                stuffRegistry[input.digest] = {
                    name: input.name,
                    concept: input.concept,
                    contentType: input.content_type,
                    data: input.data,
                    dataText: input.data_text,
                    dataHtml: input.data_html,
                };
            }
            // Only track operators as consumers for data flow edges (not controllers)
            if (input.digest && !isController) {
                if (!stuffConsumers[input.digest]) stuffConsumers[input.digest] = [];
                stuffConsumers[input.digest].push(node.node_id);
            }
        }
    }

    return {
        stuffRegistry,
        stuffProducers,
        stuffConsumers,
        controllerNodeIds,
        childNodeIds,
    };
}

const dataflowAnalysis = buildDataflowAnalysis(graphspec);

// ReactFlow setup
const { React, ReactDOM } = window;
const ReactFlowLib = window.ReactFlowRenderer || window.ReactFlow || {};
const { ReactFlow, useNodesState, useEdgesState, Background, Controls, MarkerType } = ReactFlowLib;

// Dagre layout function
function getLayoutedElements(nodes, edges, direction = 'TB') {
    const g = new dagre.graphlib.Graph();
    g.setDefaultEdgeLabel(() => ({}));
    g.setGraph({
        rankdir: direction,
        nodesep: 50,
        ranksep: 30,
        edgesep: 20,
        marginx: 40,
        marginy: 40,
    });

    nodes.forEach((node) => {
        const nodeData = node.data || {};
        const isStuff = nodeData.isStuff;
        // Estimate width based on label length (rough: 8px per character + padding)
        const labelText = nodeData.label?.props?.children?.[0]?.props?.children || '';
        const estimatedWidth = Math.max(180, Math.min(400, labelText.length * 8 + 60));
        const width = isStuff ? Math.max(180, estimatedWidth) : Math.max(200, estimatedWidth);
        const height = isStuff ? 60 : 70;
        g.setNode(node.id, { width, height });
    });

    edges.forEach((edge) => {
        g.setEdge(edge.source, edge.target);
    });

    dagre.layout(g);

    // Determine handle positions based on layout direction
    const isHorizontal = direction === 'LR' || direction === 'RL';
    const sourcePosition = isHorizontal ? 'right' : 'bottom';
    const targetPosition = isHorizontal ? 'left' : 'top';

    const layoutedNodes = nodes.map((node) => {
        const nodeWithPosition = g.node(node.id);
        const nodeData = node.data || {};
        const isStuff = nodeData.isStuff;
        const width = isStuff ? 180 : 200;
        return {
            ...node,
            position: {
                x: nodeWithPosition.x - width / 2,
                y: nodeWithPosition.y - 30,
            },
            sourcePosition,
            targetPosition,
        };
    });

    return { nodes: layoutedNodes, edges };
}

// ====================================================================
// BUILD DATAFLOW NODES AND EDGES
// ====================================================================
function buildDataflowGraph(graphspec, analysis) {
    const nodes = [];
    const edges = [];
    const nodeIdMap = {};  // original node_id -> graphspec node

    // Map node IDs to nodes
    for (const node of graphspec.nodes) {
        nodeIdMap[node.node_id] = node;
    }

    // Find participating pipes (those that produce or consume data)
    const participatingPipes = new Set();
    for (const producer of Object.values(analysis.stuffProducers)) {
        participatingPipes.add(producer);
    }
    for (const consumers of Object.values(analysis.stuffConsumers)) {
        for (const consumer of consumers) {
            participatingPipes.add(consumer);
        }
    }

    // In controller-centric mode, include batch controllers as participating pipes
    // so they appear in the graph as hub nodes for batch edges
    const showBatchController = false;
    if (showBatchController) {
        for (const edge of graphspec.edges) {
            if (edge.kind === 'batch_item') {
                // For batch_item edges, edge.source is the batch controller
                participatingPipes.add(edge.source);
            } else if (edge.kind === 'batch_aggregate') {
                // For batch_aggregate edges, edge.target is the batch controller
                participatingPipes.add(edge.target);
            }
        }
    }

    // Build batch index map: stuff_digest -> index label (e.g., "[0]", "[1]")
    // This is used to add index suffixes to batch item node labels
    const showBatchItemIndex = false;
    const batchItemIndexMap = {};  // stuff_digest -> index string
    if (showBatchItemIndex) {
        for (const edge of graphspec.edges) {
            if (edge.kind === 'batch_item' && edge.label && edge.target_stuff_digest) {
                // batch_item edge: target is the item, label contains the index
                batchItemIndexMap[edge.target_stuff_digest] = edge.label;
            } else if (edge.kind === 'batch_aggregate' && edge.label && edge.source_stuff_digest) {
                // batch_aggregate edge: source is the item, label contains the index
                batchItemIndexMap[edge.source_stuff_digest] = edge.label;
            }
        }
    }

    // Create pipe nodes (only those that participate in data flow)
    for (const node of graphspec.nodes) {
        if (!participatingPipes.has(node.node_id)) continue;

        const isFailed = node.status === 'failed';
        const label = node.pipe_code || node.node_id.split(':').pop();
        // Calculate width: ~8px per char (monospace 13px) + padding (28px)
        const nodeWidth = Math.max(160, label.length * 8 + 28);

        nodes.push({
            id: node.node_id,
            type: 'default',
            data: {
                label: React.createElement('div', {
                    style: {
                        padding: '10px 14px',
                        display: 'flex',
                        flexDirection: 'column',
                        gap: '2px',
                        textAlign: 'center',
                    }
                },
                    React.createElement('span', {
                        style: {
                            fontFamily: "'JetBrains Mono', monospace",
                            fontSize: '13px',
                            fontWeight: 600,
                            color: 'var(--color-pipe-text)',
                        }
                    }, label)
                ),
                nodeData: node,
                isPipe: true,
                isStuff: false,
            },
            position: { x: 0, y: 0 },
            style: {
                background: isFailed ? 'var(--color-pipe-failed-bg)' : 'var(--color-pipe-bg)',
                border: isFailed ? '2px solid var(--color-pipe-failed)' : '2px solid var(--color-pipe)',
                borderRadius: '8px',
                padding: '0',
                width: nodeWidth + 'px',
                boxShadow: 'var(--shadow-md)',
            },
        });
    }

    // Create stuff nodes
    for (const [digest, stuffInfo] of Object.entries(analysis.stuffRegistry)) {
        const stuffId = `stuff_${digest}`;
        const baseName = stuffInfo.name;
        // Append batch index to label if available (e.g., "topic" -> "topic[0]")
        // But only if the name doesn't already end with an index like [0], [1], etc.
        const batchIndex = batchItemIndexMap[digest] || '';
        const alreadyHasIndex = /\[\d+\]$/.test(baseName);
        const label = alreadyHasIndex ? baseName : baseName + batchIndex;
        const concept = stuffInfo.concept || '';
        // For pill shape, need extra padding. ~7px per char (12px font) + side padding (48px)
        const textWidth = Math.max(label.length, concept.length) * 7 + 48;
        const stuffWidth = Math.max(140, textWidth);

        nodes.push({
            id: stuffId,
            type: 'default',
            data: {
                label: React.createElement('div', {
                    style: {
                        padding: '8px 24px',
                        display: 'flex',
                        flexDirection: 'column',
                        alignItems: 'center',
                        gap: '2px',
                        textAlign: 'center',
                    }
                },
                    React.createElement('span', {
                        style: {
                            fontFamily: "'JetBrains Mono', monospace",
                            fontSize: '12px',
                            fontWeight: 600,
                            color: 'var(--color-stuff-text)',
                        }
                    }, label),
                    concept && React.createElement('span', {
                        style: {
                            fontSize: '14px',
                            color: 'var(--color-stuff-text-dim)',
                        }
                    }, concept)
                ),
                stuffData: stuffInfo,
                stuffDigest: digest,
                isStuff: true,
                isPipe: false,
            },
            position: { x: 0, y: 0 },
            style: {
                background: 'var(--color-stuff-bg)',
                border: '2px solid var(--color-stuff-border)',
                borderRadius: '999px',  // Pill shape
                padding: '0',
                width: stuffWidth + 'px',
                boxShadow: 'var(--shadow-md)',
                cursor: 'pointer',
            },
        });
    }

    // Create edges: producer -> stuff
    let edgeId = 0;
    for (const [digest, producerNodeId] of Object.entries(analysis.stuffProducers)) {
        const stuffId = `stuff_${digest}`;
        edges.push({
            id: `edge_${edgeId++}`,
            source: producerNodeId,
            target: stuffId,
            type: "bezier",
            animated: false,
            style: {
                stroke: 'var(--color-edge)',
                strokeWidth: 2,
            },
            markerEnd: {
                type: MarkerType?.ArrowClosed || 'arrowclosed',
                color: 'var(--color-edge)',
            },
        });
    }

    // Create edges: stuff -> consumer
    for (const [digest, consumers] of Object.entries(analysis.stuffConsumers)) {
        const stuffId = `stuff_${digest}`;
        for (const consumerNodeId of consumers) {
            edges.push({
                id: `edge_${edgeId++}`,
                source: stuffId,
                target: consumerNodeId,
                type: "bezier",
                animated: false,
                style: {
                    stroke: 'var(--color-edge)',
                    strokeWidth: 2,
                },
                markerEnd: {
                    type: MarkerType?.ArrowClosed || 'arrowclosed',
                    color: 'var(--color-edge)',
                },
            });
        }
    }

    // Create batch edges (BATCH_ITEM and BATCH_AGGREGATE) from GraphSpec
    // Two modes:
    // - Data-centric (showBatchController=false): edges connect stuff nodes directly
    //   batch_item: stuff_list → stuff_item, batch_aggregate: stuff_item → stuff_list
    // - Controller-centric (showBatchController=true): batch controller is the hub
    //   batch_item: batch_controller → stuff_item, batch_aggregate: stuff_item → batch_controller
    // (showBatchController is declared earlier in the function)

    // Create PARALLEL_COMBINE edges from GraphSpec
    // These show branch outputs flowing into the combined output
    for (const edge of graphspec.edges) {
        if (edge.kind !== 'parallel_combine') continue;

        if (!edge.source_stuff_digest || !edge.target_stuff_digest) continue;
        const sourceId = `stuff_${edge.source_stuff_digest}`;
        const targetId = `stuff_${edge.target_stuff_digest}`;

        edges.push({
            id: edge.id,
            source: sourceId,
            target: targetId,
            type: "bezier",
            animated: false,
            style: {
                stroke: 'var(--color-parallel-combine)',
                strokeWidth: 2,
                strokeDasharray: '5,5',
            },
            markerEnd: {
                type: MarkerType?.ArrowClosed || 'arrowclosed',
                color: 'var(--color-parallel-combine)',
            },
        });
    }

    for (const edge of graphspec.edges) {
        if (edge.kind !== 'batch_item' && edge.kind !== 'batch_aggregate') {
            continue;
        }

        const isBatchItem = edge.kind === 'batch_item';
        let sourceId, targetId;

        if (showBatchController) {
            // Controller-centric mode: batch controller is the hub for fan-out/fan-in
            if (isBatchItem) {
                // batch_item: batch_controller → stuff_item
                // edge.source is the batch controller, edge.target_stuff_digest is the item
                if (!edge.target_stuff_digest) continue;
                sourceId = edge.source;
                targetId = `stuff_${edge.target_stuff_digest}`;
            } else {
                // batch_aggregate: stuff_item → batch_controller
                // edge.source_stuff_digest is the item, edge.target is the batch controller
                if (!edge.source_stuff_digest) continue;
                sourceId = `stuff_${edge.source_stuff_digest}`;
                targetId = edge.target;
            }
        } else {
            // Data-centric mode: edges connect stuff nodes directly
            if (!edge.source_stuff_digest || !edge.target_stuff_digest) continue;
            sourceId = `stuff_${edge.source_stuff_digest}`;
            targetId = `stuff_${edge.target_stuff_digest}`;
        }

        edges.push({
            id: edge.edge_id,
            source: sourceId,
            target: targetId,
            type: "bezier",
            animated: false,
            label: edge.label || '',
            labelStyle: {
                fontSize: '10px',
                fontFamily: "'JetBrains Mono', monospace",
                fill: isBatchItem ? 'var(--color-batch-item)' : 'var(--color-batch-aggregate)',
            },
            labelBgStyle: {
                fill: 'var(--color-bg)',
                fillOpacity: 0.9,
            },
            style: {
                stroke: isBatchItem ? 'var(--color-batch-item)' : 'var(--color-batch-aggregate)',
                strokeWidth: 2,
                strokeDasharray: '5,5',
            },
            markerEnd: {
                type: MarkerType?.ArrowClosed || 'arrowclosed',
                color: isBatchItem ? 'var(--color-batch-item)' : 'var(--color-batch-aggregate)',
            },
        });
    }

    return { nodes, edges };
}

// ====================================================================
// FALLBACK: Build orchestration graph from GraphSpec (no dataflow)
// ====================================================================
function buildOrchestrationGraph(graphspec) {
    const nodes = graphspec.nodes.map(node => {
        const isController = node.kind === 'controller';
        const isFailed = node.status === 'failed';
        const isSucceeded = node.status === 'succeeded';
        const label = node.pipe_code || node.node_id.split(':').pop() || node.node_id;
        const badge = node.timing?.duration != null ? node.timing.duration.toFixed(1) + 's' : '';
        // Calculate width: ~8px per char (monospace 13px) + padding + status dot
        const nodeWidth = Math.max(160, (label.length || 10) * 8 + 50);

        return {
            id: node.node_id,
            type: 'default',
            data: {
                label: React.createElement('div', {
                    style: {
                        padding: '10px 14px',
                        display: 'flex',
                        flexDirection: 'column',
                        gap: '4px',
                    }
                },
                    React.createElement('div', {
                        style: {
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'space-between',
                            gap: '8px',
                        }
                    },
                        React.createElement('span', {
                            style: {
                                fontFamily: "'JetBrains Mono', monospace",
                                fontSize: '13px',
                                fontWeight: 600,
                                color: 'var(--color-pipe-text)',
                            }
                        }, label),
                        isSucceeded && React.createElement('span', {
                            style: {
                                width: '8px',
                                height: '8px',
                                borderRadius: '50%',
                                background: 'var(--color-success)',
                                flexShrink: 0,
                            }
                        }),
                        isFailed && React.createElement('span', {
                            style: {
                                width: '8px',
                                height: '8px',
                                borderRadius: '50%',
                                background: 'var(--color-error)',
                                flexShrink: 0,
                            }
                        })
                    ),
                    React.createElement('div', {
                        style: {
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'space-between',
                            gap: '8px',
                        }
                    },
                        React.createElement('span', {
                            style: {
                                fontSize: '11px',
                                color: 'var(--color-text-dim)',
                            }
                        }, isController ? 'Controller' : node.pipe_type || 'Operator'),
                        badge && React.createElement('span', {
                            style: {
                                fontSize: '10px',
                                color: 'var(--color-text-muted)',
                                background: 'var(--color-surface-hover)',
                                padding: '2px 6px',
                                borderRadius: '4px',
                                fontFamily: "'JetBrains Mono', monospace",
                            }
                        }, badge)
                    )
                ),
                nodeData: node,
                isPipe: true,
                isStuff: false,
            },
            position: { x: 0, y: 0 },
            style: {
                background: isFailed ? 'var(--color-pipe-failed-bg)' : 'var(--color-pipe-bg)',
                border: isFailed ? '2px solid var(--color-pipe-failed)' : '2px solid var(--color-pipe)',
                borderRadius: '8px',
                padding: '0',
                width: nodeWidth + 'px',
                boxShadow: 'var(--shadow-md)',
            },
        };
    });

    // Filter edges: skip CONTAINS edges (handled via containment tree)
    const visibleEdges = graphspec.edges.filter(edge => edge.kind !== 'contains');
    const edges = visibleEdges.map((edge, index) => ({
        id: edge.edge_id || 'edge_' + index,
        source: edge.source,
        target: edge.target,
        type: "bezier",
        animated: edge.kind === 'data',
        label: edge.label,
        labelStyle: {
            fontSize: 11,
            fontWeight: 500,
            fill: 'var(--color-text-muted)',
            fontFamily: "'JetBrains Mono', monospace",
        },
        labelBgStyle: {
            fill: '#0f172a',
            fillOpacity: 0.9,
        },
        labelBgPadding: [6, 4],
        labelBgBorderRadius: 4,
        style: {
            stroke: edge.kind === 'data' ? 'var(--color-edge)' : 'var(--color-text-dim)',
            strokeWidth: edge.kind === 'data' ? 2 : 1,
        },
        markerEnd: {
            type: MarkerType?.ArrowClosed || 'arrowclosed',
            color: edge.kind === 'data' ? 'var(--color-edge)' : 'var(--color-text-dim)',
        },
    }));

    return { nodes, edges };
}

// ====================================================================
// MAIN REACT COMPONENT
// ====================================================================
function GraphViewer() {
    // Build graph based on available data
    let initialData;
    if (hasDataflow) {
        initialData = buildDataflowGraph(graphspec, dataflowAnalysis);
    } else {
        initialData = buildOrchestrationGraph(graphspec);
    }

    // Apply layout
    const needsLayout = initialData.nodes.some(n => !n.position || (n.position.x === 0 && n.position.y === 0));
    const layouted = needsLayout
        ? getLayoutedElements(initialData.nodes, initialData.edges, initialDirection)
        : initialData;

    const [nodes, setNodes, onNodesChange] = useNodesState(layouted.nodes);
    const [edges, setEdges, onEdgesChange] = useEdgesState(layouted.edges);
    const [selectedNodeId, setSelectedNodeId] = React.useState(null);
    const [direction, setDirection] = React.useState(initialDirection);
    const reactFlowRef = React.useRef(null);
    const prevDirectionRef = React.useRef(initialDirection);

    // Expose setLayoutDirection so the header button can trigger re-layout
    React.useEffect(() => {
        window.setLayoutDirection = setDirection;
        return () => { window.setLayoutDirection = null; };
    }, [setDirection]);

    // Re-layout when direction changes, then fit the view
    React.useEffect(() => {
        // Skip the initial mount — only re-layout on actual direction changes
        if (prevDirectionRef.current === direction) return;
        prevDirectionRef.current = direction;
        const relayouted = getLayoutedElements(initialData.nodes, initialData.edges, direction);
        setNodes(relayouted.nodes);
        setEdges(relayouted.edges);
        // Wait for React to render the new positions, then fit view
        setTimeout(() => {
            if (reactFlowRef.current) {
                reactFlowRef.current.fitView({ padding: 0.1 });
            }
        }, 50);
    }, [direction]);

    // Expose function to clear node selection globally
    React.useEffect(() => {
        window.clearNodeSelection = () => {
            setSelectedNodeId(null);
            setNodes((nds) =>
                nds.map((n) => ({
                    ...n,
                    selected: false,
                }))
            );
        };
    }, [setNodes]);

    const onNodeClick = (event, node) => {
        // Update selected node state and highlight it
        setSelectedNodeId(node.id);
        setNodes((nds) =>
            nds.map((n) => ({
                ...n,
                selected: n.id === node.id,
            }))
        );
        const inspector = document.getElementById('inspector');
        const inspectorContent = document.getElementById('inspector-content');
        const inspectorTitle = document.getElementById('inspector-title');
        const inspectorSubtitle = document.getElementById('inspector-subtitle');
        const inspectorHeader = document.getElementById('inspector-header');

        // Reset scroll to top-left when switching nodes (keep tab selection)
        inspectorContent.scrollTop = 0;
        inspectorContent.scrollLeft = 0;

        const nodeData = node.data || {};

        // Handle stuff nodes
        if (nodeData.isStuff) {
            const stuffData = nodeData.stuffData || {};
            const stuffDigest = nodeData.stuffDigest;
            const stuffMermaidId = stuffDigest ? `s_${stuffDigest.substring(0, 10)}` : null;

            inspectorTitle.textContent = stuffData.name || 'Data';
            inspectorSubtitle.textContent = stuffData.concept || 'Data Item';
            inspectorHeader.className = 'inspector-header stuff';

            // Check which formats are available
            // First check graphspec-extracted data, then fallback to separate dictionaries
            const hasJson = !!stuffData.data;
            const hasText = !!stuffData.dataText || (stuffMermaidId && !!stuffDataText[stuffMermaidId]);
            // For PDF and image content types, HTML tab can render from JSON data via extractUrl()
            const canRenderFromJson = (stuffData.contentType === 'application/pdf' || stuffData.contentType?.startsWith('image/')) && extractUrl(stuffData.data);
            const hasHtml = !!stuffData.dataHtml || (stuffMermaidId && !!stuffDataHtml[stuffMermaidId]) || canRenderFromJson;
            const hasMultipleFormats = [hasJson, hasText, hasHtml].filter(Boolean).length > 1;

            let html = '';

            // Add format tabs if multiple formats available
            if (hasMultipleFormats) {
                html += '<div class="inspector-section">';
                html += '<div class="format-toolbar">';
                html += '<div class="format-tabs" id="stuff-format-tabs">';
                const jsonActive = currentStuffFormat === 'json' ? 'active' : '';
                const textActive = currentStuffFormat === 'text' ? 'active' : '';
                const htmlActive = currentStuffFormat === 'html' ? 'active' : '';
                const htmlTabLabel = getHtmlTabLabel(stuffData.contentType);
                html += `<button class="format-tab ${htmlActive}" data-format="html" `;
                html += `${!hasHtml ? 'disabled' : ''}>${htmlTabLabel}</button>`;
                html += `<button class="format-tab ${jsonActive}" data-format="json" `;
                html += `${!hasJson ? 'disabled' : ''}>JSON</button>`;
                html += `<button class="format-tab ${textActive}" data-format="text" `;

                <div class="inspector-pre">${nodeIo.inputs.map(i => `${i.name}: ${i.concept || 'unknown'}`).join('\\n')}</div>

            html += `<div class="inspector-section">
                <div class="inspector-section-title">Outputs (${nodeIo.outputs.length})</div>
                <div class="inspector-pre">${nodeIo.outputs.map(o => `${o.name}: ${o.concept || 'unknown'}`).join('\\n')}</div>

        );
    }

    // Store ReactFlow instance for programmatic viewport control
    const onInit = (reactFlowInstance) => {
        reactFlowRef.current = reactFlowInstance;
        // Pan to show the top of the graph after initial fit
        setTimeout(() => {
            const currentNodes = reactFlowInstance.getNodes();
            if (currentNodes.length === 0) return;
            const minY = Math.min(...currentNodes.map(n => n.position.y));
            const viewport = reactFlowInstance.getViewport();
            reactFlowInstance.setViewport({
                x: viewport.x,
