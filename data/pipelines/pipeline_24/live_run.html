/* === PALETTES === */
/* Yellow-Blue palette is the default (uses theme colors) */

/* Dracula palette - vibrant dark theme with high contrast */
[data-palette="dracula"] {
    /* Pipes / Execution Units - Salmon red (matches MTHDS syntax highlighting) */
    --color-pipe: #ff6b6b;
    --color-pipe-bg: rgba(224, 108, 117, 0.18);
    --color-pipe-text: #ffffff;

    /* Stuff / Concepts - Teal border with Pale Green variable names */
    --color-stuff: #4ECDC4;
    --color-stuff-bg: rgba(78, 205, 196, 0.12);
    --color-stuff-border: #9ddcfd;
    --color-stuff-text: #98FB98;          /* Pale Green - flashy for variable names */
    --color-stuff-text-dim: #9ddcfd;      /* Light Cyan - for concept names */

    /* Edges / Data Flow - Super light yellow, almost white */
    --color-edge: #FFFACD;
    --color-batch-item: #bd93f9;
    --color-batch-aggregate: #50fa7b;
    --color-parallel-combine: #d6a4ff;

    /* Status colors */
    --color-success: #50FA7B;             /* Bright Green */
    --color-success-bg: rgba(80, 250, 123, 0.15);
    --color-error: #FF5555;               /* Dracula Red */
    --color-error-bg: rgba(255, 85, 85, 0.15);

    /* Supporting colors */
    --color-accent: #8BE9FD;              /* Light Cyan - control flow */
    --color-warning: #FFB86C;             /* Orange - structural elements */
    --color-template: #FF79C6;            /* Magenta/Pink - template markers */
    --color-metadata: #F1FA8C;            /* Pale Yellow - attributes */
    --color-comment: #6272A4;             /* Slate Blue/Gray - comments */
}

/* Light theme adjustments for Dracula palette */
[data-theme="light"][data-palette="dracula"] {
    --color-pipe-text: #8B0000;
    --color-stuff-text: #006400;          /* Dark green for light mode */
    --color-stuff-text-dim: #006666;
    --color-edge: #B8860B;                /* Darker yellow for light mode */
}

@media (prefers-color-scheme: light) {
    [data-theme="system"][data-palette="dracula"] {
        --color-pipe-text: #8B0000;
        --color-stuff-text: #006400;
        --color-stuff-text-dim: #006666;
        --color-edge: #B8860B;
    }
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: var(--font-sans);
    height: 100vh;
    overflow: hidden;
    background: var(--color-bg);
    color: var(--color-text);
}
#app-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
}
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    z-index: 100;
}
.header-left {
    display: flex;
    align-items: center;
    gap: 16px;
}
.header-logo {
    height: 28px;
    width: auto;
}
.header-logo.dark-logo { display: block; }
.header-logo.light-logo { display: none; }
[data-theme="light"] .header-logo.dark-logo { display: none; }
[data-theme="light"] .header-logo.light-logo { display: block; }
@media (prefers-color-scheme: light) {
    [data-theme="system"] .header-logo.dark-logo { display: none; }
    [data-theme="system"] .header-logo.light-logo { display: block; }
}
.header-title {
    font-size: 14px;
    color: var(--color-text-muted);
    font-weight: 500;
}
.header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
}
.header-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: var(--color-surface-hover);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.15s ease;
    font-size: 16px;
    line-height: 1;
}
.header-btn:hover {
    background: var(--color-accent);
    border-color: var(--color-accent);
}
.theme-icon { display: none; }
.theme-icon.active { display: inline; }
.direction-icon { display: none; color: var(--color-text); }
.direction-icon.active { display: inline-flex; align-items: center; justify-content: center; }
.stat-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--color-text-muted);
}
.stat-value {
    font-weight: 600;
    color: var(--color-text);
}
.stat-icon {
    width: 16px;
    height: 16px;
    opacity: 0.7;
}
#root {
    flex: 1;
    width: 100%;
    overflow: hidden;
}
.react-flow-container {
    width: 100%;
    height: 100%;
    background: var(--color-bg);
}
.react-flow__node {
    font-family: var(--font-sans);
}
.react-flow__background {
    background: var(--color-bg) !important;
}
.react-flow__controls {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-md);
    bottom: 57px !important;
    left: 16px !important;
}
.react-flow__controls-button {
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    fill: var(--color-text-muted);
}
.react-flow__controls-button:hover {
    background: var(--color-surface-hover);
}
.react-flow__edge-path {
    stroke-width: 2;
}
.react-flow__edge-text {
    font-size: 11px;
    fill: var(--color-text-muted);
}
.react-flow__edge-textbg {
    fill: var(--color-bg);
}
/* Selected node highlight */
.react-flow__node.selected {
    box-shadow: 0 0 0 3px var(--color-accent), var(--shadow-lg) !important;
    z-index: 1000 !important;
}

/* Inspector Sidebar */
.inspector-panel {
    position: fixed;
    top: 57px;
    right: 0;
    width: 40vw;
    min-width: 360px;
    max-width: 80vw;
    height: calc(100vh - 57px - 41px);
    background: var(--color-surface);
    border-left: 1px solid var(--color-border);
    box-shadow: -4px 0 20px rgba(0, 0, 0, 0.3);
    overflow: hidden;
    z-index: 1000;
    display: none;
    transition: none;
}
.inspector-panel.visible {
    display: flex;
    flex-direction: column;
}
.inspector-resize-handle {
    position: absolute;
    left: 0;
    top: 0;
    width: 6px;
    height: 100%;
    cursor: ew-resize;
    background: transparent;
    z-index: 10;
    transition: background 0.2s;
}
.inspector-resize-handle:hover,
.inspector-resize-handle.dragging {
    background: var(--color-accent);
}
.inspector-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: linear-gradient(135deg, var(--color-accent), var(--color-stuff));
    color: white;
}
.inspector-header.stuff {
    background: linear-gradient(135deg, var(--color-stuff), var(--color-stuff-border));
}
.inspector-header.pipe {
    background: linear-gradient(135deg, var(--color-pipe), var(--color-accent));
}
.inspector-title {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.inspector-subtitle {
    font-size: 12px;
    opacity: 0.85;
    margin-top: 2px;
}
.inspector-close {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: rgba(255,255,255,0.2);
    border-radius: var(--radius-sm);
    font-size: 18px;
    line-height: 1;
    transition: background 0.15s;
}
.inspector-close:hover {
    background: rgba(255,255,255,0.3);
}
.inspector-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
}
/* Only apply flex behavior to the stuff data section, not all sections */
.inspector-content.stuff-inspector {
    display: flex;
    flex-direction: column;
}
.inspector-content.stuff-inspector > .inspector-section {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
}
#stuff-data-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
}
#stuff-data-content > .inspector-pre,
#stuff-data-content.inspector-html-content {
    flex: 1;
    max-height: none;
    min-height: 0;
    overflow-y: auto;
}
.inspector-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
}
.inspector-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 500;
    border-radius: 999px;
}
.inspector-badge.success {
    background: var(--color-success-bg);
    color: var(--color-success);
}
.inspector-badge.error {
    background: var(--color-error-bg);
    color: var(--color-error);
}
.inspector-badge.neutral {
    background: var(--color-surface-hover);
    color: var(--color-text-muted);
}
.inspector-badge.stuff {
    background: var(--color-stuff-bg);
    color: var(--color-stuff);
}
.inspector-section {
    margin-bottom: 16px;
}
.inspector-section:last-child {
    margin-bottom: 0;
}
.inspector-section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--color-text-dim);
    margin-bottom: 8px;
}
.inspector-value {
    font-size: 14px;
    color: var(--color-text);
    word-break: break-word;
}
.inspector-value.pipe-code {
    font-family: var(--font-mono);
    color: var(--color-accent);
}
.inspector-pre {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    padding: 12px;
    border-radius: var(--radius-md);
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.5;
    color: var(--color-text-muted);
    overflow-x: auto;
    max-height: 300px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
}
/* No-wrap variant for Rich-formatted ASCII tables (Pretty/Text tab) */
.inspector-pre.nowrap {
    white-space: pre;
    word-break: normal;
    line-height: 1;
    padding-right: 20px;
    -webkit-overflow-scrolling: touch;
}
.inspector-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--color-border);
}
.inspector-row:last-child {
    border-bottom: none;
}
.inspector-row-label {
    color: var(--color-text-dim);
    font-size: 13px;
}
.inspector-row-value {
    color: var(--color-text);
    font-size: 13px;
    font-weight: 500;
}

/* Format toolbar for stuff data */
.format-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    gap: 8px;
}
.format-tabs {
    display: flex;
    gap: 4px;
}
.format-tab {
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    background: var(--color-surface-hover);
    color: var(--color-text-muted);
    border: none;
    transition: all 0.2s;
}
.format-tab:hover {
    background: var(--color-border);
    color: var(--color-text);
}
.format-tab.active {
    background: var(--color-accent);
    color: #fff;
}
.format-tab:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}
.format-actions {
    display: flex;
    gap: 4px;
}
.action-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 14px;
    background: var(--color-surface-hover);
    color: var(--color-text-muted);
    border: none;
    transition: all 0.2s;
}
.action-btn:hover {
    background: var(--color-border);
    color: var(--color-text);
}
.action-btn.copied {
    background: var(--color-success-bg);
    color: var(--color-success);
}
.action-btn svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
}
.inspector-html-content {
    background: var(--color-bg);
    color: var(--color-text-muted);
    padding: 12px;
    border-radius: var(--radius-md);
    font-family: var(--font-sans);
}
.inspector-html-content table {
    border-collapse: collapse;
    width: 100%;
}
.inspector-html-content th,
.inspector-html-content td {
    border: 1px solid var(--color-border);
    padding: 8px 12px;
    text-align: left;
}
.inspector-html-content th {
    background: var(--color-surface-hover);
    color: var(--color-text);
    font-weight: 600;
}
.inspector-html-content tr:hover {
    background: var(--color-surface-hover);
}
.inspector-pdf-content {
    flex: 1;
    min-height: 400px;
}
.fullscreen-content.inspector-pdf-content {
    height: 100%;
}
.inspector-image-content {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 300px;
}
.inspector-image-content img {
    max-width: 100%;
    max-height: 70vh;
    object-fit: contain;
}
.fullscreen-content.inspector-image-content {
    height: 100%;
}

/* Top hint capsule */
.top-hint {
    position: fixed;
    top: 70px;
    right: 16px;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-pill);
    padding: 8px 16px;
    font-size: 12px;
    color: var(--color-text-dim);
    z-index: 100;
    box-shadow: var(--shadow-md);
}

/* Footer */
.footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--color-surface);
    border-top: 1px solid var(--color-border);
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
    font-size: 12px;
}
.footer-legend {
    display: flex;
    gap: 20px;
}
.legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--color-text-muted);
}
.legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
}
.legend-dot.pipe {
    background: var(--color-pipe);
}
.legend-dot.stuff {
    background: var(--color-stuff);
    border-radius: 6px;
}
.legend-dot.success {
    background: var(--color-success);
}
.legend-dot.error {
    background: var(--color-error);
}
.footer-stats {
    display: flex;
    gap: 16px;
}

/* Full-screen modal for stuff data */
.fullscreen-modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--color-bg);
    z-index: 2000;
    display: none;
    flex-direction: column;

                      "text": "# Quarterly Business Performance Report\n\n\n## Q4 2025 - Acme Corporation\n\nThis report provides a comprehensive analysis of Acme Corporation's performance during Q4 2025.\nRevenue grew 12% year-over-year, driven primarily by expansion in the enterprise segment. Operating\nmargins improved to 23.5%, up from 21.2% in the prior quarter, reflecting cost optimization initiatives\nand favorable product mix.\n\nKey highlights include the successful launch of the AcmeCloud Pro platform, which acquired 2,400 new\nenterprise accounts in its first 60 days. Customer retention remained strong at 94.2%, and Net\nPromoter Score reached an all-time high of 72.\n\n\n### Financial Summary\n\n\n<table>\n<tr>\n<th>Metric</th>\n<th>Q3 2025</th>\n<th>Q4 2025</th>\n<th>YoY Change</th>\n</tr>\n<tr>\n<td>Revenue ($M)</td>\n<td>$142.3</td>\n<td>$159.4</td>\n<td>+12.0%</td>\n</tr>\n<tr>\n<td>Gross Margin</td>\n<td>68.1%</td>\n<td>69.8%</td>\n<td>+1.7pp</td>\n</tr>\n<tr>\n<td>Operating Margin</td>\n<td>21.2%</td>\n<td>23.5%</td>\n<td>+2.3pp</td>\n</tr>\n<tr>\n<td>Net Income ($M)</td>\n<td>$28.4</td>\n<td>$35.2</td>\n<td>+23.9%</td>\n</tr>\n<tr>\n<td>Customers</td>\n<td>12,450</td>\n<td>14,850</td>\n<td>+19.3%</td>\n</tr>\n<tr>\n<td>ARR ($M)</td>\n<td>$580</td>\n<td>$648</td>\n<td>+11.7%</td>\n</tr>\n</table>\n\n\n<!-- PageBreak -->\n\n"

                  "page_view": null

                    "text": {
                      "text": "\n## Product Performance\n\nAcmeCloud Pro launched on October 15th and exceeded all internal targets. The platform's AI-powered\nanalytics suite proved to be the key differentiator, with 78% of new customers citing it as their primary\nreason for adoption. Average contract value for Pro tier customers is $48,000/year, compared to\n$18,500/year for the standard tier.\n\nThe legacy AcmeDB product continues to generate stable revenue at $42M/quarter, though new\ncustomer acquisition has slowed. Migration tools released in November have begun moving AcmeDB\ncustomers to AcmeCloud, with 340 accounts transitioning during the quarter.\n\n\n### Regional Breakdown\n\n\n<table>\n<tr>\n<th>Region</th>\n<th>Revenue</th>\n<th>% of Total</th>\n<th>Growth</th>\n</tr>\n<tr>\n<td>North America</td>\n<td>$89.2M</td>\n<td>56%</td>\n<td>+8.5%</td>\n</tr>\n<tr>\n<td>Europe</td>\n<td>$38.1M</td>\n<td>24%</td>\n<td>+15.2%</td>\n</tr>\n<tr>\n<td>Asia-Pacific</td>\n<td>$22.5M</td>\n<td>14%</td>\n<td>+22.8%</td>\n</tr>\n<tr>\n<td>Rest of World</td>\n<td>$9.6M</td>\n<td>6%</td>\n<td>+11.1%</td>\n</tr>\n</table>\n\n\n<!-- PageBreak -->\n\n"
                    },

                  "page_view": null

                  "text_and_images": {
                    "text": {
                      "text": "\n## Strategic Outlook - 2026\n\nLooking ahead to 2026, Acme Corporation is well-positioned for continued growth. Key strategic\npriorities include: (1) Expanding AcmeCloud Pro to the mid-market segment with a self-serve\nonboarding flow, (2) Launching AcmeCloud for Government with FedRAMP certification expected in\nQ2, (3) Deepening AI capabilities through the planned acquisition of DataSynth Labs, and (4)\nEstablishing direct sales presence in Japan and South Korea.\n\nManagement guidance for FY2026 projects revenue of $700-720M (up 10-13% YoY) with operating\nmargins expanding to 25-26%. The company plans to increase R&D; investment by 18% while\nmaintaining sales efficiency ratios above 1.2x.\n"

                      "text": "# Quarterly Business Performance Report\n\n\n## Q4 2025 - Acme Corporation\n\nThis report provides a comprehensive analysis of Acme Corporation's performance during Q4 2025.\nRevenue grew 12% year-over-year, driven primarily by expansion in the enterprise segment. Operating\nmargins improved to 23.5%, up from 21.2% in the prior quarter, reflecting cost optimization initiatives\nand favorable product mix.\n\nKey highlights include the successful launch of the AcmeCloud Pro platform, which acquired 2,400 new\nenterprise accounts in its first 60 days. Customer retention remained strong at 94.2%, and Net\nPromoter Score reached an all-time high of 72.\n\n\n### Financial Summary\n\n\n<table>\n<tr>\n<th>Metric</th>\n<th>Q3 2025</th>\n<th>Q4 2025</th>\n<th>YoY Change</th>\n</tr>\n<tr>\n<td>Revenue ($M)</td>\n<td>$142.3</td>\n<td>$159.4</td>\n<td>+12.0%</td>\n</tr>\n<tr>\n<td>Gross Margin</td>\n<td>68.1%</td>\n<td>69.8%</td>\n<td>+1.7pp</td>\n</tr>\n<tr>\n<td>Operating Margin</td>\n<td>21.2%</td>\n<td>23.5%</td>\n<td>+2.3pp</td>\n</tr>\n<tr>\n<td>Net Income ($M)</td>\n<td>$28.4</td>\n<td>$35.2</td>\n<td>+23.9%</td>\n</tr>\n<tr>\n<td>Customers</td>\n<td>12,450</td>\n<td>14,850</td>\n<td>+19.3%</td>\n</tr>\n<tr>\n<td>ARR ($M)</td>\n<td>$580</td>\n<td>$648</td>\n<td>+11.7%</td>\n</tr>\n</table>\n\n\n<!-- PageBreak -->\n\n"

                      "text": "\n## Product Performance\n\nAcmeCloud Pro launched on October 15th and exceeded all internal targets. The platform's AI-powered\nanalytics suite proved to be the key differentiator, with 78% of new customers citing it as their primary\nreason for adoption. Average contract value for Pro tier customers is $48,000/year, compared to\n$18,500/year for the standard tier.\n\nThe legacy AcmeDB product continues to generate stable revenue at $42M/quarter, though new\ncustomer acquisition has slowed. Migration tools released in November have begun moving AcmeDB\ncustomers to AcmeCloud, with 340 accounts transitioning during the quarter.\n\n\n### Regional Breakdown\n\n\n<table>\n<tr>\n<th>Region</th>\n<th>Revenue</th>\n<th>% of Total</th>\n<th>Growth</th>\n</tr>\n<tr>\n<td>North America</td>\n<td>$89.2M</td>\n<td>56%</td>\n<td>+8.5%</td>\n</tr>\n<tr>\n<td>Europe</td>\n<td>$38.1M</td>\n<td>24%</td>\n<td>+15.2%</td>\n</tr>\n<tr>\n<td>Asia-Pacific</td>\n<td>$22.5M</td>\n<td>14%</td>\n<td>+22.8%</td>\n</tr>\n<tr>\n<td>Rest of World</td>\n<td>$9.6M</td>\n<td>6%</td>\n<td>+11.1%</td>\n</tr>\n</table>\n\n\n<!-- PageBreak -->\n\n"

                      "text": "# Quarterly Business Performance Report\n\n\n## Q4 2025 - Acme Corporation\n\nThis report provides a comprehensive analysis of Acme Corporation's performance during Q4 2025.\nRevenue grew 12% year-over-year, driven primarily by expansion in the enterprise segment. Operating\nmargins improved to 23.5%, up from 21.2% in the prior quarter, reflecting cost optimization initiatives\nand favorable product mix.\n\nKey highlights include the successful launch of the AcmeCloud Pro platform, which acquired 2,400 new\nenterprise accounts in its first 60 days. Customer retention remained strong at 94.2%, and Net\nPromoter Score reached an all-time high of 72.\n\n\n### Financial Summary\n\n\n<table>\n<tr>\n<th>Metric</th>\n<th>Q3 2025</th>\n<th>Q4 2025</th>\n<th>YoY Change</th>\n</tr>\n<tr>\n<td>Revenue ($M)</td>\n<td>$142.3</td>\n<td>$159.4</td>\n<td>+12.0%</td>\n</tr>\n<tr>\n<td>Gross Margin</td>\n<td>68.1%</td>\n<td>69.8%</td>\n<td>+1.7pp</td>\n</tr>\n<tr>\n<td>Operating Margin</td>\n<td>21.2%</td>\n<td>23.5%</td>\n<td>+2.3pp</td>\n</tr>\n<tr>\n<td>Net Income ($M)</td>\n<td>$28.4</td>\n<td>$35.2</td>\n<td>+23.9%</td>\n</tr>\n<tr>\n<td>Customers</td>\n<td>12,450</td>\n<td>14,850</td>\n<td>+19.3%</td>\n</tr>\n<tr>\n<td>ARR ($M)</td>\n<td>$580</td>\n<td>$648</td>\n<td>+11.7%</td>\n</tr>\n</table>\n\n\n<!-- PageBreak -->\n\n"

                  "text_and_images": {
                    "text": {
                      "text": "\n## Product Performance\n\nAcmeCloud Pro launched on October 15th and exceeded all internal targets. The platform's AI-powered\nanalytics suite proved to be the key differentiator, with 78% of new customers citing it as their primary\nreason for adoption. Average contract value for Pro tier customers is $48,000/year, compared to\n$18,500/year for the standard tier.\n\nThe legacy AcmeDB product continues to generate stable revenue at $42M/quarter, though new\ncustomer acquisition has slowed. Migration tools released in November have begun moving AcmeDB\ncustomers to AcmeCloud, with 340 accounts transitioning during the quarter.\n\n\n### Regional Breakdown\n\n\n<table>\n<tr>\n<th>Region</th>\n<th>Revenue</th>\n<th>% of Total</th>\n<th>Growth</th>\n</tr>\n<tr>\n<td>North America</td>\n<td>$89.2M</td>\n<td>56%</td>\n<td>+8.5%</td>\n</tr>\n<tr>\n<td>Europe</td>\n<td>$38.1M</td>\n<td>24%</td>\n<td>+15.2%</td>\n</tr>\n<tr>\n<td>Asia-Pacific</td>\n<td>$22.5M</td>\n<td>14%</td>\n<td>+22.8%</td>\n</tr>\n<tr>\n<td>Rest of World</td>\n<td>$9.6M</td>\n<td>6%</td>\n<td>+11.1%</td>\n</tr>\n</table>\n\n\n<!-- PageBreak -->\n\n"

                  "text_and_images": {
                    "text": {
                      "text": "\n## Strategic Outlook - 2026\n\nLooking ahead to 2026, Acme Corporation is well-positioned for continued growth. Key strategic\npriorities include: (1) Expanding AcmeCloud Pro to the mid-market segment with a self-serve\nonboarding flow, (2) Launching AcmeCloud for Government with FedRAMP certification expected in\nQ2, (3) Deepening AI capabilities through the planned acquisition of DataSynth Labs, and (4)\nEstablishing direct sales presence in Japan and South Korea.\n\nManagement guidance for FY2026 projects revenue of $700-720M (up 10-13% YoY) with operating\nmargins expanding to 25-26%. The company plans to increase R&D; investment by 18% while\nmaintaining sales efficiency ratios above 1.2x.\n"

                      "text": "\n## Strategic Outlook - 2026\n\nLooking ahead to 2026, Acme Corporation is well-positioned for continued growth. Key strategic\npriorities include: (1) Expanding AcmeCloud Pro to the mid-market segment with a self-serve\nonboarding flow, (2) Launching AcmeCloud for Government with FedRAMP certification expected in\nQ2, (3) Deepening AI capabilities through the planned acquisition of DataSynth Labs, and (4)\nEstablishing direct sales presence in Japan and South Korea.\n\nManagement guidance for FY2026 projects revenue of $700-720M (up 10-13% YoY) with operating\nmargins expanding to 25-26%. The company plans to increase R&D; investment by 18% while\nmaintaining sales efficiency ratios above 1.2x.\n"

            "data_text": "   1    \u2502                 Quarterly Business Performance Report                 \n        \u2502                                                                       \n        \u2502 Q4 2025 - Acme Corporation                                            \n        \u2502                                                                       \n        \u2502 This report provides a comprehensive analysis of Acme Corporation's   \n        \u2502 performance during Q4 2025. Revenue grew 12% year-over-year, driven   \n        \u2502 primarily by expansion in the enterprise segment. Operating margins   \n        \u2502 improved to 23.5%, up from 21.2% in the prior quarter, reflecting     \n        \u2502 cost optimization initiatives and favorable product mix.              \n        \u2502                                                                       \n        \u2502 Key highlights include the successful launch of the AcmeCloud Pro     \n        \u2502 platform, which acquired 2,400 new enterprise accounts in its first   \n        \u2502 60 days. Customer retention remained strong at 94.2%, and Net         \n        \u2502 Promoter Score reached an all-time high of 72.                        \n        \u2502                                                                       \n        \u2502 Financial Summary                                                     \n        \u2502                                                                       \n        \u2502                                                                       \n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n   2    \u2502 Product Performance                                                   \n        \u2502                                                                       \n        \u2502 AcmeCloud Pro launched on October 15th and exceeded all internal      \n        \u2502 targets. The platform's AI-powered analytics suite proved to be the   \n        \u2502 key differentiator, with 78% of new customers citing it as their      \n        \u2502 primary reason for adoption. Average contract value for Pro tier      \n        \u2502 customers is $48,000/year, compared to $18,500/year for the standard  \n        \u2502 tier.                                                                 \n        \u2502                                                                       \n        \u2502 The legacy AcmeDB product continues to generate stable revenue at     \n        \u2502 $42M/quarter, though new customer acquisition has slowed. Migration   \n        \u2502 tools released in November have begun moving AcmeDB customers to      \n        \u2502 AcmeCloud, with 340 accounts transitioning during the quarter.        \n        \u2502                                                                       \n        \u2502 Regional Breakdown                                                    \n        \u2502                                                                       \n        \u2502                                                                       \n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n   3    \u2502 Strategic Outlook - 2026                                              \n        \u2502                                                                       \n        \u2502 Looking ahead to 2026, Acme Corporation is well-positioned for        \n        \u2502 continued growth. Key strategic priorities include: (1) Expanding     \n        \u2502 AcmeCloud Pro to the mid-market segment with a self-serve onboarding  \n        \u2502 flow, (2) Launching AcmeCloud for Government with FedRAMP             \n        \u2502 certification expected in Q2, (3) Deepening AI capabilities through   \n        \u2502 the planned acquisition of DataSynth Labs, and (4) Establishing       \n        \u2502 direct sales presence in Japan and South Korea.                       \n        \u2502                                                                       \n        \u2502 Management guidance for FY2026 projects revenue of $700-720M (up      \n        \u2502 10-13% YoY) with operating margins expanding to 25-26%. The company   \n        \u2502 plans to increase R&D; investment by 18% while maintaining sales      \n        \u2502 efficiency ratios above 1.2x.                                         \n",
            "data_html": "<ul><li><table><tr><th>text_and_images</th><td># Quarterly Business Performance Report\n\n\n## Q4 2025 - Acme Corporation\n\nThis report provides a comprehensive analysis of Acme Corporation&#x27;s performance during Q4 2025.\nRevenue grew 12% year-over-year, driven primarily by expansion in the enterprise segment. Operating\nmargins improved to 23.5%, up from 21.2% in the prior quarter, reflecting cost optimization initiatives\nand favorable product mix.\n\nKey highlights include the successful launch of the AcmeCloud Pro platform, which acquired 2,400 new\nenterprise accounts in its first 60 days. Customer retention remained strong at 94.2%, and Net\nPromoter Score reached an all-time high of 72.\n\n\n### Financial Summary\n\n\n&lt;table&gt;\n&lt;tr&gt;\n&lt;th&gt;Metric&lt;/th&gt;\n&lt;th&gt;Q3 2025&lt;/th&gt;\n&lt;th&gt;Q4 2025&lt;/th&gt;\n&lt;th&gt;YoY Change&lt;/th&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Revenue ($M)&lt;/td&gt;\n&lt;td&gt;$142.3&lt;/td&gt;\n&lt;td&gt;$159.4&lt;/td&gt;\n&lt;td&gt;+12.0%&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Gross Margin&lt;/td&gt;\n&lt;td&gt;68.1%&lt;/td&gt;\n&lt;td&gt;69.8%&lt;/td&gt;\n&lt;td&gt;+1.7pp&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Operating Margin&lt;/td&gt;\n&lt;td&gt;21.2%&lt;/td&gt;\n&lt;td&gt;23.5%&lt;/td&gt;\n&lt;td&gt;+2.3pp&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Net Income ($M)&lt;/td&gt;\n&lt;td&gt;$28.4&lt;/td&gt;\n&lt;td&gt;$35.2&lt;/td&gt;\n&lt;td&gt;+23.9%&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Customers&lt;/td&gt;\n&lt;td&gt;12,450&lt;/td&gt;\n&lt;td&gt;14,850&lt;/td&gt;\n&lt;td&gt;+19.3%&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ARR ($M)&lt;/td&gt;\n&lt;td&gt;$580&lt;/td&gt;\n&lt;td&gt;$648&lt;/td&gt;\n&lt;td&gt;+11.7%&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;\n\n\n&lt;!-- PageBreak --&gt;\n\n</td></tr></table></li><li><table><tr><th>text_and_images</th><td>\n## Product Performance\n\nAcmeCloud Pro launched on October 15th and exceeded all internal targets. The platform&#x27;s AI-powered\nanalytics suite proved to be the key differentiator, with 78% of new customers citing it as their primary\nreason for adoption. Average contract value for Pro tier customers is $48,000/year, compared to\n$18,500/year for the standard tier.\n\nThe legacy AcmeDB product continues to generate stable revenue at $42M/quarter, though new\ncustomer acquisition has slowed. Migration tools released in November have begun moving AcmeDB\ncustomers to AcmeCloud, with 340 accounts transitioning during the quarter.\n\n\n### Regional Breakdown\n\n\n&lt;table&gt;\n&lt;tr&gt;\n&lt;th&gt;Region&lt;/th&gt;\n&lt;th&gt;Revenue&lt;/th&gt;\n&lt;th&gt;% of Total&lt;/th&gt;\n&lt;th&gt;Growth&lt;/th&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;North America&lt;/td&gt;\n&lt;td&gt;$89.2M&lt;/td&gt;\n&lt;td&gt;56%&lt;/td&gt;\n&lt;td&gt;+8.5%&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Europe&lt;/td&gt;\n&lt;td&gt;$38.1M&lt;/td&gt;\n&lt;td&gt;24%&lt;/td&gt;\n&lt;td&gt;+15.2%&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Asia-Pacific&lt;/td&gt;\n&lt;td&gt;$22.5M&lt;/td&gt;\n&lt;td&gt;14%&lt;/td&gt;\n&lt;td&gt;+22.8%&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Rest of World&lt;/td&gt;\n&lt;td&gt;$9.6M&lt;/td&gt;\n&lt;td&gt;6%&lt;/td&gt;\n&lt;td&gt;+11.1%&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;\n\n\n&lt;!-- PageBreak --&gt;\n\n</td></tr></table></li><li><table><tr><th>text_and_images</th><td>\n## Strategic Outlook - 2026\n\nLooking ahead to 2026, Acme Corporation is well-positioned for continued growth. Key strategic\npriorities include: (1) Expanding AcmeCloud Pro to the mid-market segment with a self-serve\nonboarding flow, (2) Launching AcmeCloud for Government with FedRAMP certification expected in\nQ2, (3) Deepening AI capabilities through the planned acquisition of DataSynth Labs, and (4)\nEstablishing direct sales presence in Japan and South Korea.\n\nManagement guidance for FY2026 projects revenue of $700-720M (up 10-13% YoY) with operating\nmargins expanding to 25-26%. The company plans to increase R&amp;D; investment by 18% while\nmaintaining sales efficiency ratios above 1.2x.\n</td></tr></table></li></ul>",
