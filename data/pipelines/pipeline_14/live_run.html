/* === PALETTES === */
/* Yellow-Blue palette is the default (uses theme colors) */

/* Dracula palette - vibrant dark theme with high contrast */
[data-palette="dracula"] {
    /* Pipes / Execution Units - Salmon red (matches MTHDS syntax highlighting) */
    --color-pipe: #ff6b6b;
    --color-pipe-bg: rgba(224, 108, 117, 0.18);
    --color-pipe-text: #ffffff;

    /* Stuff / Concepts - Teal border with Pale Green variable names */
    --color-stuff: #4ECDC4;
    --color-stuff-bg: rgba(78, 205, 196, 0.12);
    --color-stuff-border: #9ddcfd;
    --color-stuff-text: #98FB98;          /* Pale Green - flashy for variable names */
    --color-stuff-text-dim: #9ddcfd;      /* Light Cyan - for concept names */

    /* Edges / Data Flow - Super light yellow, almost white */
    --color-edge: #FFFACD;
    --color-batch-item: #bd93f9;
    --color-batch-aggregate: #50fa7b;
    --color-parallel-combine: #d6a4ff;

    /* Status colors */
    --color-success: #50FA7B;             /* Bright Green */
    --color-success-bg: rgba(80, 250, 123, 0.15);
    --color-error: #FF5555;               /* Dracula Red */
    --color-error-bg: rgba(255, 85, 85, 0.15);

    /* Supporting colors */
    --color-accent: #8BE9FD;              /* Light Cyan - control flow */
    --color-warning: #FFB86C;             /* Orange - structural elements */
    --color-template: #FF79C6;            /* Magenta/Pink - template markers */
    --color-metadata: #F1FA8C;            /* Pale Yellow - attributes */
    --color-comment: #6272A4;             /* Slate Blue/Gray - comments */
}

/* Light theme adjustments for Dracula palette */
[data-theme="light"][data-palette="dracula"] {
    --color-pipe-text: #8B0000;
    --color-stuff-text: #006400;          /* Dark green for light mode */
    --color-stuff-text-dim: #006666;
    --color-edge: #B8860B;                /* Darker yellow for light mode */
}

@media (prefers-color-scheme: light) {
    [data-theme="system"][data-palette="dracula"] {
        --color-pipe-text: #8B0000;
        --color-stuff-text: #006400;
        --color-stuff-text-dim: #006666;
        --color-edge: #B8860B;
    }
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: var(--font-sans);
    height: 100vh;
    overflow: hidden;
    background: var(--color-bg);
    color: var(--color-text);
}
#app-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
}
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    z-index: 100;
}
.header-left {
    display: flex;
    align-items: center;
    gap: 16px;
}
.header-logo {
    height: 28px;
    width: auto;
}
.header-logo.dark-logo { display: block; }
.header-logo.light-logo { display: none; }
[data-theme="light"] .header-logo.dark-logo { display: none; }
[data-theme="light"] .header-logo.light-logo { display: block; }
@media (prefers-color-scheme: light) {
    [data-theme="system"] .header-logo.dark-logo { display: none; }
    [data-theme="system"] .header-logo.light-logo { display: block; }
}
.header-title {
    font-size: 14px;
    color: var(--color-text-muted);
    font-weight: 500;
}
.header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
}
.header-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: var(--color-surface-hover);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.15s ease;
    font-size: 16px;
    line-height: 1;
}
.header-btn:hover {
    background: var(--color-accent);
    border-color: var(--color-accent);
}
.theme-icon { display: none; }
.theme-icon.active { display: inline; }
.direction-icon { display: none; color: var(--color-text); }
.direction-icon.active { display: inline-flex; align-items: center; justify-content: center; }
.stat-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--color-text-muted);
}
.stat-value {
    font-weight: 600;
    color: var(--color-text);
}
.stat-icon {
    width: 16px;
    height: 16px;
    opacity: 0.7;
}
#root {
    flex: 1;
    width: 100%;
    overflow: hidden;
}
.react-flow-container {
    width: 100%;
    height: 100%;
    background: var(--color-bg);
}
.react-flow__node {
    font-family: var(--font-sans);
}
.react-flow__background {
    background: var(--color-bg) !important;
}
.react-flow__controls {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-md);
    bottom: 57px !important;
    left: 16px !important;
}
.react-flow__controls-button {
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    fill: var(--color-text-muted);
}
.react-flow__controls-button:hover {
    background: var(--color-surface-hover);
}
.react-flow__edge-path {
    stroke-width: 2;
}
.react-flow__edge-text {
    font-size: 11px;
    fill: var(--color-text-muted);
}
.react-flow__edge-textbg {
    fill: var(--color-bg);
}
/* Selected node highlight */
.react-flow__node.selected {
    box-shadow: 0 0 0 3px var(--color-accent), var(--shadow-lg) !important;
    z-index: 1000 !important;
}

/* Inspector Sidebar */
.inspector-panel {
    position: fixed;
    top: 57px;
    right: 0;
    width: 40vw;
    min-width: 360px;
    max-width: 80vw;
    height: calc(100vh - 57px - 41px);
    background: var(--color-surface);
    border-left: 1px solid var(--color-border);
    box-shadow: -4px 0 20px rgba(0, 0, 0, 0.3);
    overflow: hidden;
    z-index: 1000;
    display: none;
    transition: none;
}
.inspector-panel.visible {
    display: flex;
    flex-direction: column;
}
.inspector-resize-handle {
    position: absolute;
    left: 0;
    top: 0;
    width: 6px;
    height: 100%;
    cursor: ew-resize;
    background: transparent;
    z-index: 10;
    transition: background 0.2s;
}
.inspector-resize-handle:hover,
.inspector-resize-handle.dragging {
    background: var(--color-accent);
}
.inspector-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: linear-gradient(135deg, var(--color-accent), var(--color-stuff));
    color: white;
}
.inspector-header.stuff {
    background: linear-gradient(135deg, var(--color-stuff), var(--color-stuff-border));
}
.inspector-header.pipe {
    background: linear-gradient(135deg, var(--color-pipe), var(--color-accent));
}
.inspector-title {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.inspector-subtitle {
    font-size: 12px;
    opacity: 0.85;
    margin-top: 2px;
}
.inspector-close {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: rgba(255,255,255,0.2);
    border-radius: var(--radius-sm);
    font-size: 18px;
    line-height: 1;
    transition: background 0.15s;
}
.inspector-close:hover {
    background: rgba(255,255,255,0.3);
}
.inspector-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
}
/* Only apply flex behavior to the stuff data section, not all sections */
.inspector-content.stuff-inspector {
    display: flex;
    flex-direction: column;
}
.inspector-content.stuff-inspector > .inspector-section {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
}
#stuff-data-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
}
#stuff-data-content > .inspector-pre,
#stuff-data-content.inspector-html-content {
    flex: 1;
    max-height: none;
    min-height: 0;
    overflow-y: auto;
}
.inspector-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
}
.inspector-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 500;
    border-radius: 999px;
}
.inspector-badge.success {
    background: var(--color-success-bg);
    color: var(--color-success);
}
.inspector-badge.error {
    background: var(--color-error-bg);
    color: var(--color-error);
}
.inspector-badge.neutral {
    background: var(--color-surface-hover);
    color: var(--color-text-muted);
}
.inspector-badge.stuff {
    background: var(--color-stuff-bg);
    color: var(--color-stuff);
}
.inspector-section {
    margin-bottom: 16px;
}
.inspector-section:last-child {
    margin-bottom: 0;
}
.inspector-section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--color-text-dim);
    margin-bottom: 8px;
}
.inspector-value {
    font-size: 14px;
    color: var(--color-text);
    word-break: break-word;
}
.inspector-value.pipe-code {
    font-family: var(--font-mono);
    color: var(--color-accent);
}
.inspector-pre {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    padding: 12px;
    border-radius: var(--radius-md);
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.5;
    color: var(--color-text-muted);
    overflow-x: auto;
    max-height: 300px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
}
/* No-wrap variant for Rich-formatted ASCII tables (Pretty/Text tab) */
.inspector-pre.nowrap {
    white-space: pre;
    word-break: normal;
    line-height: 1;
    padding-right: 20px;
    -webkit-overflow-scrolling: touch;
}
.inspector-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--color-border);
}
.inspector-row:last-child {
    border-bottom: none;
}
.inspector-row-label {
    color: var(--color-text-dim);
    font-size: 13px;
}
.inspector-row-value {
    color: var(--color-text);
    font-size: 13px;
    font-weight: 500;
}

/* Format toolbar for stuff data */
.format-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    gap: 8px;
}
.format-tabs {
    display: flex;
    gap: 4px;
}
.format-tab {
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    background: var(--color-surface-hover);
    color: var(--color-text-muted);
    border: none;
    transition: all 0.2s;
}
.format-tab:hover {
    background: var(--color-border);
    color: var(--color-text);
}
.format-tab.active {
    background: var(--color-accent);
    color: #fff;
}
.format-tab:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}
.format-actions {
    display: flex;
    gap: 4px;
}
.action-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 14px;
    background: var(--color-surface-hover);
    color: var(--color-text-muted);
    border: none;
    transition: all 0.2s;
}
.action-btn:hover {
    background: var(--color-border);
    color: var(--color-text);
}
.action-btn.copied {
    background: var(--color-success-bg);
    color: var(--color-success);
}
.action-btn svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
}
.inspector-html-content {
    background: var(--color-bg);
    color: var(--color-text-muted);
    padding: 12px;
    border-radius: var(--radius-md);
    font-family: var(--font-sans);
}
.inspector-html-content table {
    border-collapse: collapse;
    width: 100%;
}
.inspector-html-content th,
.inspector-html-content td {
    border: 1px solid var(--color-border);
    padding: 8px 12px;
    text-align: left;
}
.inspector-html-content th {
    background: var(--color-surface-hover);
    color: var(--color-text);
    font-weight: 600;
}
.inspector-html-content tr:hover {
    background: var(--color-surface-hover);
}
.inspector-pdf-content {
    flex: 1;
    min-height: 400px;
}
.fullscreen-content.inspector-pdf-content {
    height: 100%;
}
.inspector-image-content {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 300px;
}
.inspector-image-content img {
    max-width: 100%;
    max-height: 70vh;
    object-fit: contain;
}
.fullscreen-content.inspector-image-content {
    height: 100%;
}

/* Top hint capsule */
.top-hint {
    position: fixed;
    top: 70px;
    right: 16px;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-pill);
    padding: 8px 16px;
    font-size: 12px;
    color: var(--color-text-dim);
    z-index: 100;
    box-shadow: var(--shadow-md);
}

/* Footer */
.footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--color-surface);
    border-top: 1px solid var(--color-border);
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
    font-size: 12px;
}
.footer-legend {
    display: flex;
    gap: 20px;
}
.legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--color-text-muted);
}
.legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
}
.legend-dot.pipe {
    background: var(--color-pipe);
}
.legend-dot.stuff {
    background: var(--color-stuff);
    border-radius: 6px;
}
.legend-dot.success {
    background: var(--color-success);
}
.legend-dot.error {
    background: var(--color-error);
}
.footer-stats {
    display: flex;
    gap: 16px;
}

/* Full-screen modal for stuff data */
.fullscreen-modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--color-bg);
    z-index: 2000;
    display: none;
    flex-direction: column;

mer retention and satisfaction\n- Margin expansion through operational efficiency\n- Geographic diversification with strong Asia-Pacific growth\n\n**Considerations:**\n- Legacy product (AcmeDB) showing signs of maturity\n- Heavy reliance on North American market (56%)\n- Planned acquisition introduces integration risk\n- Increased R&D spending will impact near-term margins\n\n**Overall Assessment:** The company demonstrates strong momentum with successful product innovation, healthy unit economics, and clear strategic direction for continued growth.\n```\n\n## Related Research\nsearch_result: ```\nRelated research for analysis of quarterly business performance reports includes:\n\n1. Guidance on how to write and present quarterly business reports effectively, focusing on tracking KPIs, comparing metrics, and identifying trends to prioritize tasks and highlight achievements[1].\n\n2. Examples and best practices for quarterly business reviews (QBRs), emphasizing the importance of explaining the context behind data, focusing on objectives and key results (OKRs), and making QBRs forward-looking strategic sessions rather than just data recaps[2][9].\n\n3. Comprehensive guides on QBRs that describe formats such as PowerPoint presentations and written reports, the use of visualization tools for data clarity, and the involvement of key stakeholders to review performance and strategy[3].\n\n4. Templates and structured formats for QBRs that help teams review past performance, share insights on customer relationships, and plan future quarters with data-driven reports for stakeholders[4][13].\n\n5. Research on the alignment of KPIs and OKRs in QBRs, highlighting challenges organizations face in connecting strategic aspirations with measurable performance indicators[5].\n\n6. Studies on the impact of quarterly reporting on business behavior, including potential short-term thinking and investment effects, providing a broader context for interpreting quarterly performance data[7]. r basic foundational needs, including report date range, customer names, and team information. Gather data on key performance indicators (KPIs) such as revenue, customer satisfaction, and project completion rates. Use this data to inform wins, losses, and deals pushed to next quarter.\nWho should be using the quarterly business review (QBR) template? Business leaders and execs: For reviewing company performance and setting future objectives. Sales managers and revenue teams: For creating visually appealing, data-driven reports to present to stakeholders.\nUse the QBR template during a sales team meeting to review the past quarter's sales performance and set targets for the next quarter. Present the QBR template to the executive team to provide a high-level overview of the company's performance and strategic direction. Share the QBR template with clients to demonstrate the value you have added to their business and discuss plans for the upcoming quarter.\n- Quarterly Business Review: How to extract benefits beyond transparency: https://www.mckinsey.com/capabilities/people-and-organizational-performance/our-insights/the-organization-blog/quarterly-business-review-how-to-extract-benefits-beyond-transparency\n  KPI and OKR misalignment: OKRs are among the most fundamental elements of QBR logic, used by many organizations to set aspirational targets with motivating narratives to rally people behind a common vision. In the QBR, these units must define OKRs from strategic company aspirations. Yet, organizations often struggle to draw a connector line between the newly introduced OKR concept and end-of-year key performance indicators (KPIs).\nOctober 5, 2020In previous research, our colleagues have outlined the importance for agile organizations to create both stable and dynamic practices. A periodic business review, prioritization of different activities, and alignment across organizational units (frequently called tribes) are often together referred to as Quarterly Business Reviews (QBRs).\nMcKinsey & Company, Inc. uses cookies to better understand how visitors use our site, to collect and analyze information on site performance and usage, and for cross-context behavioral advertising and targeted advertising purposes.\nThese cookies allow us to count visits and traffic sources so we can measure and improve the performance of our site and app. They help us to know which pages are the most and least popular and see how visitors move around the site and app. All information these cookies collect is aggregated and therefore anonymous.\nKPI and OKR misalignment: OKRs are among the most fundamental elements of QBR logic, used by many organizations to set aspirational targets with motivating narratives to rally people behind a common vision. In the QBR, these units must define OKRs from strategic company aspirations. Yet, organizations often struggle to draw a connector line between the newly introduced OKR concept and end-of-year key performance indicators (KPIs).\n- Quarterly Business Review Presentation Template | Beautiful.ai: https://www.beautiful.ai/presentations/quarterly-business-review\n  Quarterly business reviews are crucial for evaluating progress and steering the ship in the right direction. They are a comprehensive assessment that reflects on a quarter\u2019s performance and involve a lot of metrics, strategy organization, feedback, and operational reflections.\nQuarterly business reviews are crucial for evaluating progress and steering the ship in the right direction. They are a comprehensive assessment that reflects on a quarter\u2019s performance and involve a lot of metrics, strategy organization, feedback, and operational reflections.\nWith Beautiful.ai\u2019s quarterly business review template, you can take all that wealth of information and distill it down to the essentials - making sure to highlight those actionable insights that foster alignment across departments. Showcase key metrics that tie back into your performance goals\nThis template allows teams to create a structured quarterly performance assessment, ensuring clear communication of key insights and strategic priorities. Tailoring this template to your own quarterly business review presentation is simple.\nEver found yourself knee-deep in a quarterly business review; diving into metrics, comparing performance against goals, and seeking out areas for improvement?\n- The Pros and Cons of Quarterly Reporting: https://poole.ncsu.edu/thought-leadership/article/the-pros-and-cons-of-quarterly-reporting/\n  Research shows quarterly reporting contributes to both the stability of the U.S. stock market and, potentially, short-term thinking by firms. Any change should follow rigorous, transparent analysis by policymakers.\nResearch shows quarterly reporting contributes to both the stability of the U.S. stock market and, potentially, short-term thinking by firms. Any change should follow rigorous, transparent analysis by policymakers. Since 1970, publicly traded companies in the United States have been required to report on their earnings and performance every three months.\nWhat might a change in corporate reporting requirements mean for markets and investors? A Poole finance scholar explains.\nBoth academic researchers and practitioners have questioned several aspects of the current reporting requirements, suggesting they contribute to: The reporting regulations could make compliance too costly, onerous and cumbersome, especially for smaller firms and more complex ones. The quarterly cadence may also incentivize firms and their managers to focus on quarterly performance rather than think more long term.\nIn 2018, economists at Duke University and City University London analyzed firms over the 1950-1970 period\u2014when quarterly reporting mandates took effect. They found that a decline in the firms\u2019 investments accompanied increased reporting frequency, likely due to myopic managerial behavior. At least partly motivated by m                       "text": "# Quarterly Business Performance Report\n\n\n## Q4 2025 - Acme Corporation\n\nThis report provides a comprehensive analysis of Acme Corporation's performance during Q4 2025.\nRevenue grew 12% year-over-year, driven primarily by expansion in the enterprise segment. Operating\nmargins improved to 23.5%, up from 21.2% in the prior quarter, reflecting cost optimization initiatives\nand favorable product mix.\n\nKey highlights include the successful launch of the AcmeCloud Pro platform, which acquired 2,400 new\nenterprise accounts in its first 60 days. Customer retention remained strong at 94.2%, and Net\nPromoter Score reached an all-time high of 72.\n\n\n### Financial Summary\n\n\n<table>\n<tr>\n<th>Metric</th>\n<th>Q3 2025</th>\n<th>Q4 2025</th>\n<th>YoY Change</th>\n</tr>\n<tr>\n<td>Revenue ($M)</td>\n<td>$142.3</td>\n<td>$159.4</td>\n<td>+12.0%</td>\n</tr>\n<tr>\n<td>Gross Margin</td>\n<td>68.1%</td>\n<td>69.8%</td>\n<td>+1.7pp</td>\n</tr>\n<tr>\n<td>Operating Margin</td>\n<td>21.2%</td>\n<td>23.5%</td>\n<td>+2.3pp</td>\n</tr>\n<tr>\n<td>Net Income ($M)</td>\n<td>$28.4</td>\n<td>$35.2</td>\n<td>+23.9%</td>\n</tr>\n<tr>\n<td>Customers</td>\n<td>12,450</td>\n<td>14,850</td>\n<td>+19.3%</td>\n</tr>\n<tr>\n<td>ARR ($M)</td>\n<td>$580</td>\n<td>$648</td>\n<td>+11.7%</td>\n</tr>\n</table>\n\n\n<!-- PageBreak -->\n\n"

                      "text": "\n## Product Performance\n\nAcmeCloud Pro launched on October 15th and exceeded all internal targets. The platform's AI-powered\nanalytics suite proved to be the key differentiator, with 78% of new customers citing it as their primary\nreason for adoption. Average contract value for Pro tier customers is $48,000/year, compared to\n$18,500/year for the standard tier.\n\nThe legacy AcmeDB product continues to generate stable revenue at $42M/quarter, though new\ncustomer acquisition has slowed. Migration tools released in November have begun moving AcmeDB\ncustomers to AcmeCloud, with 340 accounts transitioning during the quarter.\n\n\n### Regional Breakdown\n\n\n<table>\n<tr>\n<th>Region</th>\n<th>Revenue</th>\n<th>% of Total</th>\n<th>Growth</th>\n</tr>\n<tr>\n<td>North America</td>\n<td>$89.2M</td>\n<td>56%</td>\n<td>+8.5%</td>\n</tr>\n<tr>\n<td>Europe</td>\n<td>$38.1M</td>\n<td>24%</td>\n<td>+15.2%</td>\n</tr>\n<tr>\n<td>Asia-Pacific</td>\n<td>$22.5M</td>\n<td>14%</td>\n<td>+22.8%</td>\n</tr>\n<tr>\n<td>Rest of World</td>\n<td>$9.6M</td>\n<td>6%</td>\n<td>+11.1%</td>\n</tr>\n</table>\n\n\n<!-- PageBreak -->\n\n"

                      "text": "# Quarterly Business Performance Report\n\n\n## Q4 2025 - Acme Corporation\n\nThis report provides a comprehensive analysis of Acme Corporation's performance during Q4 2025.\nRevenue grew 12% year-over-year, driven primarily by expansion in the enterprise segment. Operating\nmargins improved to 23.5%, up from 21.2% in the prior quarter, reflecting cost optimization initiatives\nand favorable product mix.\n\nKey highlights include the successful launch of the AcmeCloud Pro platform, which acquired 2,400 new\nenterprise accounts in its first 60 days. Customer retention remained strong at 94.2%, and Net\nPromoter Score reached an all-time high of 72.\n\n\n### Financial Summary\n\n\n<table>\n<tr>\n<th>Metric</th>\n<th>Q3 2025</th>\n<th>Q4 2025</th>\n<th>YoY Change</th>\n</tr>\n<tr>\n<td>Revenue ($M)</td>\n<td>$142.3</td>\n<td>$159.4</td>\n<td>+12.0%</td>\n</tr>\n<tr>\n<td>Gross Margin</td>\n<td>68.1%</td>\n<td>69.8%</td>\n<td>+1.7pp</td>\n</tr>\n<tr>\n<td>Operating Margin</td>\n<td>21.2%</td>\n<td>23.5%</td>\n<td>+2.3pp</td>\n</tr>\n<tr>\n<td>Net Income ($M)</td>\n<td>$28.4</td>\n<td>$35.2</td>\n<td>+23.9%</td>\n</tr>\n<tr>\n<td>Customers</td>\n<td>12,450</td>\n<td>14,850</td>\n<td>+19.3%</td>\n</tr>\n<tr>\n<td>ARR ($M)</td>\n<td>$580</td>\n<td>$648</td>\n<td>+11.7%</td>\n</tr>\n</table>\n\n\n<!-- PageBreak -->\n\n"

              "text": "# Analysis of Quarterly Business Performance Report\n\n## Document Overview\nThis is a Q4 2025 performance report for **Acme Corporation**, structured across three pages covering financial results, product performance, and strategic outlook.\n\n---\n\n## Key Findings\n\n### Financial Performance (Page 1)\n**Strong Quarter with Significant Growth:**\n- Revenue: $159.4M (up 12% YoY from $142.3M in Q3)\n- Net Income: $35.2M (up 23.9%)\n- Operating Margin: 23.5% (improved from 21.2% in Q3)\n- Customer Base: 14,850 (up 19.3%)\n- ARR: $648M (up 11.7%)\n\n**Notable Metrics:**\n- Customer retention: 94.2%\n- Net Promoter Score: 72 (all-time high)\n- Gross margin improved to 69.8%\n\n### Product Performance (Page 2)\n\n**AcmeCloud Pro (New Product):**\n- Launched October 15th\n- 2,400 new enterprise accounts in first 60 days\n- Average contract value: $48,000/year\n- 78% of customers cited AI-powered analytics as primary adoption driver\n\n**AcmeDB (Legacy Product):**\n- Stable at $42M/quarter\n- Slowing new customer acquisition\n- 340 accounts migrated to AcmeCloud during Q4\n\n**Regional Distribution:**\n- North America: 56% of revenue ($89.2M), +8.5% growth\n- Europe: 24% ($38.1M), +15.2% growth\n- Asia-Pacific: 14% ($22.5M), +22.8% growth (fastest growing)\n- Rest of World: 6% ($9.6M), +11.1% growth\n\n### Strategic Outlook (Page 3)\n\n**2026 Priorities:**\n1. Expand AcmeCloud Pro to mid-market with self-serve onboarding\n2. Launch AcmeCloud for Government (FedRAMP certification in Q2)\n3. Acquire DataSynth Labs for AI capabilities\n4. Establish direct sales in Japan and South Korea\n\n**FY2026 Guidance:**\n- Revenue: $700-720M (10-13% growth)\n- Operating margins: 25-26%\n- R&D investment increase: 18%\n- Sales efficiency ratio target: >1.2x\n\n---\n\n## Business Health Assessment\n\n**Strengths:**\n- Strong revenue and profit growth\n- Successful new product launch exceeding targets\n- High customer retention and satisfaction\n- Margin expansion ults. We will explore diverse formats, from executive dashboards to customer-centric deep dives, and provide actionable analysis on structure, key metrics, and presentation strategies.\nThe Quarterly Business Review (QBR) is a cornerstone of customer success, yet many Customer Success Managers (CSMs) struggle to elevate it beyond a simple data dump. A truly effective QBR is not just a backward-looking report; it is a forward-looking strategic session that strengthens partnerships, uncovers opportunities, and solidifies value.</small></li><li><a href=\"https://www.rollstack.com/articles/quarterly-business-reviews-comprehensive-guide\" class=\"msg-document\">Quarterly Business Reviews (QBRs): Comprehensive Guide</a><br/><small>\u200dPowerPoint Presentations: Visually summarize performance, goals, and strategies.\u200d \u00b7 Written Reports (Documents): Provide in-depth analysis of the quarter&amp;#x27;s results, that tend to be more text heavy.\nA Quarterly Business Review (QBR) is a meeting or report presented every three months to review business performance and strategy. It typically involves key stakeholders, such as management, team leaders, and sometimes clients. Imagine gathering the collective brains of your company to scrutinize the past quarter\u2019s performance, identify pitfalls, and chart a future course\u2014that&#39;s a QBR for you.\n\u200dPowerPoint Presentations: Visually summarize performance, goals, and strategies.\u200d \u00b7 Written Reports (Documents): Provide in-depth analysis of the quarter&#39;s results, that tend to be more text heavy.\nVisualization Tools (Looker, Tableau): Essential for taking all this data and making it easy to understand through dashboards, reports, and charts. These tools handle multiple data sources for a comprehensive view of the business. Tools like Rollstack, then take these data and put them in presentations. dbt (data build tool): Prepares raw data from different places for analysis.\nFocus: Gathering requiremen loring this template to your own quarterly business review presentation is simple.\nEver found yourself knee-deep in a quarterly business review; diving into metrics, comparing performance against goals, and seeking out areas for improvement?</small></li><li><a href=\"https://poole.ncsu.edu/thought-leadership/article/the-pros-and-cons-of-quarterly-reporting/\" class=\"msg-document\">The Pros and Cons of Quarterly Reporting</a><br/><small>Research shows quarterly reporting contributes to both the stability of the U.S. stock market and, potentially, short-term thinking by firms. Any change should follow rigorous, transparent analysis by policymakers.\nResearch shows quarterly reporting contributes to both the stability of the U.S. stock market and, potentially, short-term thinking by firms. Any change should follow rigorous, transparent analysis by policymakers. Since 1970, publicly traded companies in the United States have been required to report on their earnings and performance every three months.\nWhat might a change in corporate reporting requirements mean for markets and investors? A Poole finance scholar explains.\nBoth academic researchers and practitioners have questioned several aspects of the current reporting requirements, suggesting they contribute to: The reporting regulations could make compliance too costly, onerous and cumbersome, especially for smaller firms and more complex ones. The quarterly cadence may also incentivize firms and their managers to focus on quarterly performance rather than think more long term.\nIn 2018, economists at Duke University and City University London analyzed firms over the 1950-1970 period\u2014when quarterly reporting mandates took effect. They found that a decline in the firms\u2019 investments accompanied increased reporting frequency, likely due to myopic managerial behavior. At least partly motivated by myopic behavior by managers, researchers have questioned whether financial statements accurately depict a firm\u2019s true financial performance.</small></li><li><a href=\"https://blog.revpartners.io/en/revops-articles/quarterly-business-review\" class=\"msg-document\">Understanding Quarterly Business Reviews</a><br/><small>Financial analysis is a critical component of any quarterly business review. It involves scrutinizing various financial metrics and statements, including balance sheets, income statements, and cash flow statements.\nLearn how to run a high-impact quarterly business review with the right metrics, stakeholder insights, and our free QBR template and webinar series.\nIn addition, financial analysis also aids in budgeting, forecasting, and securing funding or investments. ... Need help setting up custom objects, forecast fields, or attribution logic? Our HubSpot Technical Consulting team builds the backend infrastructure to power QBR reporting. \ud83d\udc47 \u00b7 A comprehensive sales and marketing review during a quarterly business review is crucial for assessing a company&#39;s effectiveness in generating leads, driving conversions, and fostering customer loyalty.\nFinancial analysis is a critical component of any quarterly business review. It involves scrutinizing various financial metrics and statements, including balance sheets, income statements, and cash flow statements. By examining these records, businesses can discern patterns, evaluate fiscal health, and predict future performance.\nBuild the Dashboard \u2014 Line up reports in sequence (Sessions \u2192 Leads \u2192 Deals \u2192 Revenue). Draft the Data Model Slide \u2014 Put the numbers in one place so trends are obvious. Highlight 3 Callouts \u2014 One from leads, two from deals\u2014color-coded red/green/blue. Do an In-Depth Analysis \u2014 Drill into \u201cwhy\u201d with secondary KPIs and partitions. Polish &amp; Align \u2014 Clean the deck, align on the story, and confirm next-quarter goals.</small></li><li><a href=\"https://www.gainsight.com/essential-guide/quarterly-business-reviews-qbrs/\"  from Salesforce shows that 87% of business buyers want their reps to be trusted advisors, so it\u2019s important to bring those relationships and value-driven conversations into a single, strategic discussion.</small></li><li><a href=\"https://workingbackwards.com/concepts/quarterly-monthly-business-reviews/\" class=\"msg-document\">Quarterly &amp; Monthly Business Reviews - Working Backwards</a><br/><small>Once you have a report that holistically covers those input metrics (in a WBR), you can focus on identifying the right initiatives to drive your inputs. The PR/FAQ process is the best practice used at Amazon to conceive of, develop, and decide on the right initiatives to pursue. These proposed initiatives are one of the primary ingredients of each team\u2019s annual operating plan. Once the CEO approves the annual operating plan, the Monthly or Quarterly Business Review enables the CEO and leadership team to have a focused, detailed, one-hour or more discussion with each significant operating unit and function to ensure they are on track to achieve their goals.\nMonthly or Quarterly Business Review (MBR/QBR) A monthly or quarterly business review is essential to the operating cadence. Each P&amp;L and operating unit (e.g., manufacturing, customer service, sales) should prepare a document (6 pages or fewer + additional tables in the appendix) to review results from the prior month.\nIn some cases, it makes more sense to do this quarterly. Each group leader writes a BR with assistance from their team and finance counterpart(s). The team should meet with the CEO, their direct reports, and other relevant stakeholders (at the discretion of the CEO) for a one-hour review. Timing: within 5-10 business days (the sooner, the better) after each month ends.\nOnce you have a report that holistically covers those input metrics (in a WBR), you can focus on identifying the right initiatives to drive your inputs. The PR/FAQ process is the best practice used at Amazon to conceiv ationships[18].\n\n10. Templates and tools for performance analysis reports that automate data updates and leverage AI to generate insights, aiding in continuous business performance optimization[19].\n\nThese sources provide a comprehensive foundation for analyzing quarterly business performance reports, covering report creation, presentation, strategic alignment, and performance evaluation methodologies.",

                  "snippet": "Research shows quarterly reporting contributes to both the stability of the U.S. stock market and, potentially, short-term thinking by firms. Any change should follow rigorous, transparent analysis by policymakers.\nResearch shows quarterly reporting contributes to both the stability of the U.S. stock market and, potentially, short-term thinking by firms. Any change should follow rigorous, transparent analysis by policymakers. Since 1970, publicly traded companies in the United States have been required to report on their earnings and performance every three months.\nWhat might a change in corporate reporting requirements mean for markets and investors? A Poole finance scholar explains.\nBoth academic researchers and practitioners have questioned several aspects of the current reporting requirements, suggesting they contribute to: The reporting regulations could make compliance too costly, onerous and cumbersome, especially for smaller firms and more complex ones. The quarterly cadence may also incentivize firms and their managers to focus on quarterly performance rather than think more long term.\nIn 2018, economists at Duke University and City University London analyzed firms over the 1950-1970 period\u2014when quarterly reporting mandates took effect. They found that a decline in the firms\u2019 investments accompanied increased reporting frequency, likely due to myopic managerial behavior. At least partly motivated by myopic behavior by managers, researchers have questioned whether financial statements accurately depict a firm\u2019s true financial performance."

ults. We will explore diverse formats, from executive dashboards to customer-centric deep dives, and provide actionable analysis on structure, key metrics, and presentation strategies.\nThe Quarterly Business Review (QBR) is a cornerstone of customer success, yet many Customer Success Managers (CSMs) struggle to elevate it beyond a simple data dump. A truly effective QBR is not just a backward-looking report; it is a forward-looking strategic session that strengthens partnerships, uncovers opportunities, and solidifies value.</small></li><li><a href=\"https://www.rollstack.com/articles/quarterly-business-reviews-comprehensive-guide\" class=\"msg-document\">Quarterly Business Reviews (QBRs): Comprehensive Guide</a><br/><small>\u200dPowerPoint Presentations: Visually summarize performance, goals, and strategies.\u200d \u00b7 Written Reports (Documents): Provide in-depth analysis of the quarter&amp;#x27;s results, that tend to be more text heavy.\nA Quarterly Business Review (QBR) is a meeting or report presented every three months to review business performance and strategy. It typically involves key stakeholders, such as management, team leaders, and sometimes clients. Imagine gathering the collective brains of your company to scrutinize the past quarter\u2019s performance, identify pitfalls, and chart a future course\u2014that&#39;s a QBR for you.\n\u200dPowerPoint Presentations: Visually summarize performance, goals, and strategies.\u200d \u00b7 Written Reports (Documents): Provide in-depth analysis of the quarter&#39;s results, that tend to be more text heavy.\nVisualization Tools (Looker, Tableau): Essential for taking all this data and making it easy to understand through dashboards, reports, and charts. These tools handle multiple data sources for a comprehensive view of the business. Tools like Rollstack, then take these data and put them in presentations. dbt (data build tool): Prepares raw data from different places for analysis.\nFocus: Gathering requiremen kers. Since 1970, publicly traded companies in the United States have been required to \nreport on their earnings and performance every three months.\nWhat might a change in corporate reporting requirements mean for markets and investors? A Poole \nfinance scholar explains.\nBoth academic researchers and practitioners have questioned several aspects of the current reporting\nrequirements, suggesting they contribute to: The reporting regulations could make compliance too \ncostly, onerous and cumbersome, especially for smaller firms and more complex ones. The quarterly \ncadence may also incentivize firms and their managers to focus on quarterly performance rather than \nthink more long term.\nIn 2018, economists at Duke University and City University London analyzed firms over the 1950-1970 \nperiod\u2014when quarterly reporting mandates took effect. They found that a decline in the firms\u2019 \ninvestments accompanied increased reporting frequency, likely due to myopic managerial behavior. At \nleast partly motivated by myopic behavior by managers, researchers have questioned whether financial\nstatements accurately depict a firm\u2019s true financial performance.\n\nUnderstanding Quarterly Business Reviews \n(https://blog.revpartners.io/en/revops-articles/quarterly-business-review)\n  Financial analysis is a critical component of any quarterly business review. It involves \nscrutinizing various financial metrics and statements, including balance sheets, income statements, \nand cash flow statements.\nLearn how to run a high-impact quarterly business review with the right metrics, stakeholder \ninsights, and our free QBR template and webinar series.\nIn addition, financial analysis also aids in budgeting, forecasting, and securing funding or \ninvestments. ... Need help setting up custom objects, forecast fields, or attribution logic? Our \nHubSpot Technical Consulting team builds the backend infrastructure to power QBR reporting. \ud83d\udc47 \u00b7 A \ncomprehen nd evaluation to our programs and operations. Rigorous evidence helps us understand and improve the efficiency and effectiveness of both. This helps our leadership make sound decisions about our programs, policies, and resources. As part of our FY 2018-2022 Strategic Plan, SBA created an Enterprise Learning Agenda (ELA). The ELA includes a set of key research and evaluation questions for each strategic goal.\n```", "s_2106a19fcc": "<a href=\"file:///Users/thomashebrardevotis/dev/pipelex/mthds-ui/.pipelex/storage/normalized/dFTjea4hw47Nidb8VQ84yw.pdf\" class=\"msg-document\">file:///Users/thomashebrardevotis/dev/pipelex/mthds-ui/.pipelex/storage/normalized/dFTjea4hw47Nidb8VQ84yw.pdf</a>", "s_103a7af009": "<ul><li><table><tr><th>text_and_images</th><td># Quarterly Business Performance Report\n\n\n## Q4 2025 - Acme Corporation\n\nThis report provides a comprehensive analysis of Acme Corporation&#x27;s performance during Q4 2025.\nRevenue grew 12% year-over-year, driven primarily by expansion in the enterprise segment. Operating\nmargins improved to 23.5%, up from 21.2% in the prior quarter, reflecting cost optimization initiatives\nand favorable product mix.\n\nKey highlights include the successful launch of the AcmeCloud Pro platform, which acquired 2,400 new\nenterprise accounts in its first 60 days. Customer retention remained strong at 94.2%, and Net\nPromoter Score reached an all-time high of 72.\n\n\n### Financial Summary\n\n\n&lt;table&gt;\n&lt;tr&gt;\n&lt;th&gt;Metric&lt;/th&gt;\n&lt;th&gt;Q3 2025&lt;/th&gt;\n&lt;th&gt;Q4 2025&lt;/th&gt;\n&lt;th&gt;YoY Change&lt;/th&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Revenue ($M)&lt;/td&gt;\n&lt;td&gt;$142.3&lt;/td&gt;\n&lt;td&gt;$159.4&lt;/td&gt;\n&lt;td&gt;+12.0%&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Gross Margin&lt;/td&gt;\n&lt;td&gt;68.1%&lt;/td&gt;\n&lt;td&gt;69.8%&lt;/td&gt;\n&lt;td&gt;+1.7pp&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Operating Margin&lt;/td&gt;\n&lt;td&gt;21.2%&lt;/td&gt;\n&lt;td&gt;23.5%&lt;/td&gt;\n&lt;td&gt;+2.3pp&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Net Income ($M)&lt;/td&gt;\n&lt;td&gt;$28.4&lt;/td&gt;\n&lt;td&gt;$35.2&lt;/td&gt;\n&lt;td&gt;+23.9%&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Customers&lt;/td&gt;\n&lt;td&gt;12,450&lt;/td&gt;\n&lt;td&gt;14,850&lt;/td&gt;\n&lt;td&gt;+19.3%&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;ARR ($M)&lt;/td&gt;\n&lt;td&gt;$580&lt;/td&gt;\n&lt;td&gt;$648&lt;/td&gt;\n&lt;td&gt;+11.7%&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;\n\n\n&lt;!-- PageBreak --&gt;\n\n</td></tr></table></li><li><table><tr><th>text_and_images</th><td>\n## Product Performance\n\nAcmeCloud Pro launched on October 15th and exceeded all internal targets. The platform&#x27;s AI-powered\nanalytics suite proved to be the key differentiator, with 78% of new customers citing it as their primary\nreason for adoption. Average contract value for Pro tier customers is $48,000/year, compared to\n$18,500/year for the standard tier.\n\nThe legacy AcmeDB product continues to generate stable revenue at $42M/quarter, though new\ncustomer acquisition has slowed. Migration tools released in November have begun moving AcmeDB\ncustomers to AcmeCloud, with 340 accounts transitioning during the quarter.\n\n\n### Regional Breakdown\n\n\n&lt;table&gt;\n&lt;tr&gt;\n&lt;th&gt;Region&lt;/th&gt;\n&lt;th&gt;Revenue&lt;/th&gt;\n&lt;th&gt;% of Total&lt;/th&gt;\n&lt;th&gt;Growth&lt;/th&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;North America&lt;/td&gt;\n&lt;td&gt;$89.2M&lt;/td&gt;\n&lt;td&gt;56%&lt;/td&gt;\n&lt;td&gt;+8.5%&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Europe&lt;/td&gt;\n&lt;td&gt;$38.1M&lt;/td&gt;\n&lt;td&gt;24%&lt;/td&gt;\n&lt;td&gt;+15.2%&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Asia-Pacific&lt;/td&gt;\n&lt;td&gt;$22.5M&lt;/td&gt;\n&lt;td&gt;14%&lt;/td&gt;\n&lt;td&gt;+22.8%&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Rest of World&lt;/td&gt;\n&lt;td&gt;$9.6M&lt;/td&gt;\n&lt;td&gt;6%&lt;/td&gt;\n&lt;td&gt;+11.1%&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/table&gt;\n\n\n&lt;!-- PageBreak --&gt;\n\n</td></tr></table></li><li><table><tr><th>text_and_images</th><td>\n## Strategic Outlook - 2026\n\nLooking ahead to 2026, Acme Corporation is well-positioned for continued growth. Key strategic\npriorities include: (1) Expanding AcmeCloud Pro to the mid-market segment with a self-serve\nonboarding flow, (2) Launching AcmeCloud for Government with FedRAMP certification expected in\nQ2, (3) Deepening AI capabilities through the planned acquisition of DataSynth Labs, and (4)\nEstablishing direct sales presence in Japan and South Korea.\n\nManagement guidance for FY2026 projects revenue of $700-720M (up 10-13% YoY) with operating\nmargins expanding to 25-26%. The company plans to increase R&amp;D; investment by 18% while\nmaintaining sales efficiency ratios above 1.2x.\n</td></tr></table></li></ul>", "s_7770aa5fd7": "# Analysis of Quarterly Business Performance Report\n\n## Document Overview\nThis is a Q4 2025 performance report for **Acme Corporation**, structured across three pages covering financial results, product performance, and strategic outlook.\n\n---\n\n## Key Findings\n\n### Financial Performance (Page 1)\n**Strong Quarter with Significant Growth:**\n- Revenue: $159.4M (up 12% YoY from $142.3M in Q3)\n- Net Income: $35.2M (up 23.9%)\n- Operating Margin: 23.5% (improved from 21.2% in Q3)\n- Customer Base: 14,850 (up 19.3%)\n- ARR: $648M (up 11.7%)\n\n**Notable Metrics:**\n- Customer retention: 94.2%\n- Net Promoter Score: 72 (all-time high)\n- Gross margin improved to 69.8%\n\n### Product Performance (Page 2)\n\n**AcmeCloud Pro (New Product):**\n- Launched October 15th\n- 2,400 new enterprise accounts in first 60 days\n- Average contract value: $48,000/year\n- 78% of customers cited AI-powered analytics as primary adoption driver\n\n**AcmeDB (Legacy Product):**\n- Stable at $42M/quarter\n- Slowing new customer acquisition\n- 340 accounts migrated to AcmeCloud during Q4\n\n**Regional Distribution:**\n- North America: 56% of revenue ($89.2M), +8.5% growth\n- Europe: 24% ($38.1M), +15.2% growth\n- Asia-Pacific: 14% ($22.5M), +22.8% growth (fastest growing)\n- Rest of World: 6% ($9.6M), +11.1% growth\n\n### Strategic Outlook (Page 3)\n\n**2026 Priorities:**\n1. Expand AcmeCloud Pro to mid-market with self-serve onboarding\n2. Launch AcmeCloud for Government (FedRAMP certification in Q2)\n3. Acquire DataSynth Labs for AI capabilities\n4. Establish direct sales in Japan and South Korea\n\n**FY2026 Guidance:**\n- Revenue: $700-720M (10-13% growth)\n- Operating margins: 25-26%\n- R&amp;D investment increase: 18%\n- Sales efficiency ratio target: &gt;1.2x\n\n---\n\n## Business Health Assessment\n\n**Strengths:**\n- Strong revenue and profit growth\n- Successful new product launch exceeding targets\n- High customer retention and satisfaction\n- Margin expansion through operational efficiency\n- Geographic diversification with strong Asia-Pacific growth\n\n**Considerations:**\n- Legacy product (AcmeDB) showing signs of maturity\n- Heavy reliance on North American market (56%)\n- Planned acquisition introduces integration risk\n- Increased R&amp;D spending will impact near-term margins\n\n**Overall Assessment:** The company demonstrates strong momentum with successful product innovation, healthy unit economics, and clear strategic direction for continued growth.", "s_5fb09cdc2a": "<div><p>Related research for analysis of quarterly business performance reports includes:\n\n1. Guidance on how to write and present quarterly business reports effectively, focusing on tracking KPIs, comparing metrics, and identifying trends to prioritize tasks and highlight achievements[1].\n\n2. Examples and best practices for quarterly business reviews (QBRs), emphasizing the importance of explaining the context behind data, focusing on objectives and key results (OKRs), and making QBRs forward-looking strategic sessions rather than just data recaps[2][9].\n\n3. Comprehensive guides on QBRs that des ysis by policymakers.\nResearch shows quarterly reporting contributes to both the stability of the U.S. stock market and, potentially, short-term thinking by firms. Any change should follow rigorous, transparent analysis by policymakers. Since 1970, publicly traded companies in the United States have been required to report on their earnings and performance every three months.\nWhat might a change in corporate reporting requirements mean for markets and investors? A Poole finance scholar explains.\nBoth academic researchers and practitioners have questioned several aspects of the current reporting requirements, suggesting they contribute to: The reporting regulations could make compliance too costly, onerous and cumbersome, especially for smaller firms and more complex ones. The quarterly cadence may also incentivize firms and their managers to focus on quarterly performance rather than think more long term.\nIn 2018, economists at Duke University and City University London analyzed firms over the 1950-1970 period\u2014when quarterly reporting mandates took effect. They found that a decline in the firms\u2019 investments accompanied increased reporting frequency, likely due to myopic managerial behavior. At least partly motivated by myopic behavior by managers, researchers have questioned whether financial statements accurately depict a firm\u2019s true financial performance.</small></li><li><a href=\"https://blog.revpartners.io/en/revops-articles/quarterly-business-review\" class=\"msg-document\">Understanding Quarterly Business Reviews</a><br/><small>Financial analysis is a critical component of any quarterly business review. It involves scrutinizing various financial metrics and statements, including balance sheets, income statements, and cash flow statements.\nLearn how to run a high-impact quarterly business review with the right metrics, stakeholder insights, and our free QBR template and webinar series.\nIn addition, financial analysis also aids in budgeting, const themes = ['dark', 'light', 'system'];
const initialTheme = "dark";
let currentThemeIndex = themes.indexOf(localStorage.getItem('pipelex-theme') || initialTheme);
if (currentThemeIndex === -1) currentThemeIndex = 0;

// Layout direction toggle
const initialDirection = "LR";
let currentDirection = initialDirection;

const palette = "dracula";

function applyPalette(palette) {
    document.documentElement.setAttribute('data-palette', palette);
}

function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('pipelex-theme', theme);
    // Update button icons
    document.querySelectorAll('.theme-icon').forEach(icon => icon.classList.remove('active'));
    const activeIcon = document.querySelector(`.${theme}-icon`);
    if (activeIcon) activeIcon.classList.add('active');
}

// Set up theme toggle button
document.getElementById('theme-toggle').addEventListener('click', () => {
    currentThemeIndex = (currentThemeIndex + 1) % themes.length;
    applyTheme(themes[currentThemeIndex]);
});

// Apply initial theme and palette immediately
applyTheme(themes[currentThemeIndex]);
applyPalette(palette);

// Apply direction icon: show the direction we will switch TO (opposite of current)
function applyDirectionIcon(direction) {
    document.querySelectorAll('.direction-icon').forEach(icon => icon.classList.remove('active'));
    const targetIcon = document.querySelector(direction === 'LR' ? '.tb-icon' : '.lr-icon');
    if (targetIcon) targetIcon.classList.add('active');
}
applyDirectionIcon(currentDirection);

// Set up direction toggle button

// ====================================================================
// DATAFLOW ANALYSIS: Extract stuff nodes and build producer/consumer maps
// This mirrors the Python GraphAnalysis logic
// ====================================================================
function buildDataflowAnalysis(graphspec) {
    if (!graphspec) return null;

    const stuffRegistry = {};      // digest -> { name, concept, data, dataText, dataHtml }
    const stuffProducers = {};     // digest -> producer_node_id
    const stuffConsumers = {};     // digest -> [consumer_node_ids]
    const containmentTree = {};    // parent_id -> [child_ids]
    const childNodeIds = new Set();

    // Build containment tree from edges
    for (const edge of graphspec.edges) {
        if (edge.kind === 'contains') {
            if (!containmentTree[edge.source]) containmentTree[edge.source] = [];
            containmentTree[edge.source].push(edge.target);
            childNodeIds.add(edge.target);
        }
    }

    // Controller IDs are nodes that have children
    const controllerNodeIds = new Set(Object.keys(containmentTree));

    // Process all nodes to register stuffs
    // Two passes: first register all stuffs, then build producer/consumer maps for operators only
    for (const node of graphspec.nodes) {
        const nodeIo = node.node_io || {};
        const isController = controllerNodeIds.has(node.node_id);

        // Register outputs to stuffRegistry from ALL nodes (including controllers for batch aggregates)
        for (const output of (nodeIo.outputs || [])) {
            if (output.digest && !stuffRegistry[output.digest]) {
                stuffRegistry[output.digest] = {
                    name: output.name,
                    concept: output.concept,
                    contentType: output.content_type,
                    data: output.data,
                    dataText: output.data_text,
                    dataHtml: output.data_html,
                };
            }
            // Only track operators as producers for data flow edges (not controllers)
            if (output.digest && !isController) {
                stuffProducers[output.digest] = node.node_id;
            }
        }

        // Register inputs to stuffRegistry (pipeline inputs may not have producers)
        for (const input of (nodeIo.inputs || [])) {
            if (input.digest && !stuffRegistry[input.digest]) {
                stuffRegistry[input.digest] = {
                    name: input.name,
                    concept: input.concept,
                    contentType: input.content_type,
                    data: input.data,
                    dataText: input.data_text,
                    dataHtml: input.data_html,
                };
            }
            // Only track operators as consumers for data flow edges (not controllers)
            if (input.digest && !isController) {
                if (!stuffConsumers[input.digest]) stuffConsumers[input.digest] = [];
                stuffConsumers[input.digest].push(node.node_id);
            }
        }
    }

    return {
        stuffRegistry,
        stuffProducers,
        stuffConsumers,
        controllerNodeIds,
        childNodeIds,
    };
}
